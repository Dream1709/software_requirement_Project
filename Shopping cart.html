<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสั่งอาหาร - ร้านเพิ่มข้าว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#f26522',
                            brown: '#d19d5c',
                            textMuted: '#b06f59',
                            tableBorder: '#f0d9cf',
                            summaryBg: '#ebd4c9',
                            btnGray: '#f5efec',
                            qrBgPink: '#f4d2c7',
                            qrFrameWhite: '#ffffff',
                            bgWhite: '#fcfbf9',
                            bgSuccess: '#a2d89d',
                            qrBgSuccess: '#8eb371',
                            qrFrameSuccess: '#9ccb94',
                            checkGreen: '#00ff33'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#e9ecef] flex justify-center py-10 min-h-screen font-sans relative">

    <div class="w-full max-w-5xl shadow-sm border border-gray-200 relative overflow-hidden bg-brand-bgWhite transition-colors duration-500" id="main-container">
        
        <div id="cart-section" class="block">
            <div class="px-10 pt-6 pb-0 flex gap-6 text-sm">
                <div class="text-blue-500 font-medium pb-2 cursor-pointer">สรุปรายการอาหาร</div>
                <div class="text-black font-bold border-b-2 border-black pb-2 cursor-pointer">รายการอาหาร</div>
            </div>
            <div class="w-full h-px bg-gray-200"></div>

            <div class="p-10 md:p-16">
                <h1 class="text-3xl font-bold mb-8">ตะกร้าสินค้า</h1>

                <div class="flex items-center gap-4 mb-8">
                    <div class="w-14 h-14 bg-brand-brown rounded-xl flex items-center justify-center text-white shadow-sm">
                        <svg class="w-8 h-8 opacity-80" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
                    </div>
                    <div>
                        <p class="font-bold text-gray-800 text-lg">สั่งจาก สมปอง</p>
                        <p class="text-brand-textMuted text-sm font-medium">โต๊ะ: 4</p>
                    </div>
                </div>

                <div class="border border-brand-tableBorder rounded-2xl overflow-hidden mb-8">
                    <div class="grid grid-cols-12 px-6 py-4 border-b border-brand-tableBorder text-brand-textMuted text-sm font-medium">
                        <div class="col-span-6">สินค้า</div>
                        <div class="col-span-3 text-center">ราคา</div>
                        <div class="col-span-3 text-center">จำนวน</div>
                    </div>
                    <div id="cart-items-container"></div>
                    <div class="grid grid-cols-12 px-6 py-4 bg-brand-summaryBg text-brand-textMuted text-sm font-medium">
                        <div class="col-span-6 flex items-center">รวม</div>
                        <div class="col-span-3 text-center flex items-center justify-center" id="cart-total-price">0 บาท</div>
                        <div class="col-span-3 text-center flex items-center justify-center pr-10" id="cart-total-qty">0</div>
                    </div>
                </div>

                <div class="flex justify-end gap-4 mb-12">
                    <button class="px-6 py-2.5 bg-brand-btnGray text-gray-800 rounded-lg text-sm font-medium hover:bg-gray-200 transition">เลือกอาหารเพิ่ม</button>
                    <button onclick="goToPayment()" class="px-6 py-2.5 bg-brand-orange text-white rounded-lg text-sm font-medium shadow-sm hover:bg-orange-600 transition">ส่งออเดอร์</button>
                </div>

                <div class="w-full h-[250px] rounded-xl overflow-hidden relative shadow-sm">
                    <img src="https://images.unsplash.com/photo-1559314809-0d155014e29e?q=80&w=2000&auto=format&fit=crop" class="w-full h-full object-cover">
                    <div class="absolute top-8 left-8 bg-[#6b4c3a] bg-opacity-90 px-6 py-3 rounded text-white font-bold text-2xl border-2 border-[#543b2d] transform -rotate-2 shadow-lg">ร้านเพิ่มข้าว</div>
                </div>
            </div>
        </div>

        <div id="payment-section" class="hidden min-h-screen flex flex-col p-10 md:p-16 relative">
            
            <div class="flex items-center justify-between border-b border-gray-400/30 pb-4 mb-8 relative z-10">
                <button onclick="goToCart()" class="text-gray-800 hover:text-black font-medium flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    ฿ ชำระเงิน
                </button>
                <button id="back-to-home-btn" onclick="resetApp()" class="hidden text-sm font-medium underline text-gray-800 hover:text-black">
                    กลับไปหน้าแรก
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-16 flex-1 relative z-10">
                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">สรุปรายการ</h2>
                    <p class="text-gray-600 text-sm mb-6">โต๊ะ:สมปอง</p>
                    <div id="payment-items-container" class="space-y-4 mb-8 border-b border-gray-400/30 pb-6"></div>
                    <div class="flex justify-between items-center font-bold text-gray-800">
                        <span>รวม</span>
                        <span id="payment-total-price">฿0</span>
                    </div>
                </div>

                <div class="flex flex-col items-center justify-start pt-4">
                    <h2 class="text-2xl font-bold mb-6 text-gray-800">ชำระเงิน</h2>
                    <div id="qr-bg" class="bg-brand-qrBgPink p-8 rounded-2xl shadow-md w-full max-w-[300px] aspect-square flex items-center justify-center transition-colors duration-500">
                        <div id="qr-frame" class="bg-brand-qrFrameWhite p-4 shadow-inner w-full h-full flex items-center justify-center transition-colors duration-500">
                            <img id="qr-image" src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/QR_code_for_mobile_English_Wikipedia.svg/1200px-QR_code_for_mobile_English_Wikipedia.svg.png" alt="QR Code" class="w-full h-full object-contain mix-blend-multiply transition-all duration-500">
                        </div>
                    </div>
                    <button id="simulate-btn" onclick="completePayment()" class="mt-8 px-6 py-2 bg-gray-800 text-white rounded-lg shadow hover:bg-black transition text-sm">
                        (จำลอง) แสกนจ่ายสำเร็จ คลิกที่นี่
                    </button>
                </div>
            </div>

            <div id="success-overlay" class="absolute inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-500">
                <div id="success-icon" class="w-36 h-36 bg-white rounded-full shadow-2xl flex items-center justify-center transform scale-50 transition-transform duration-500 delay-100">
                    <svg class="w-20 h-20 text-brand-checkGreen" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                </div>
            </div>

        </div>
    </div>

    <div id="delete-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-10 max-w-lg w-[90%] md:w-[450px] shadow-2xl flex flex-col relative transform transition-transform scale-100">
            
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 bg-[#fff0e6] rounded-full flex items-center justify-center flex-shrink-0">
                    <svg class="w-6 h-6 text-brand-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                </div>
                <h3 class="text-2xl font-bold text-gray-900">ลบรายการนี้ใช่หรือไม่</h3>
            </div>
            
            <p class="text-gray-500 text-base mb-10 text-center">รายการนี้จะถูกนำออกจากตะกร้าของคุณ</p>
            
            <div class="flex justify-center w-full gap-4">
                <button onclick="hideDeleteModal()" class="w-32 py-3 rounded-xl font-bold text-gray-600 bg-white hover:bg-gray-100 transition">ไม่</button>
                <button onclick="confirmDelete()" class="w-32 py-3 rounded-xl font-bold text-white bg-brand-orange hover:bg-orange-600 shadow-sm transition">ใช่</button>
            </div>
        </div>
    </div>

    <script>
        // ข้อมูลสินค้าเบื้องต้น
        let cart = [
            { id: 1, name: 'ผัดกะเพรา + หมูกรอบ + พิเศษ', price: 60, quantity: 1 }
        ];

        let itemToDeleteIndex = null; // ตัวแปรเก็บ index ของรายการที่กำลังจะถูกลบ

        // Elements
        const mainContainer = document.getElementById('main-container');
        const sections = {
            cart: document.getElementById('cart-section'),
            payment: document.getElementById('payment-section')
        };
        const deleteModal = document.getElementById('delete-modal');

        const qrBg = document.getElementById('qr-bg');
        const qrFrame = document.getElementById('qr-frame');
        const successOverlay = document.getElementById('success-overlay');
        const successIcon = document.getElementById('success-icon');
        const simulateBtn = document.getElementById('simulate-btn');
        const backToHomeBtn = document.getElementById('back-to-home-btn');

        // --- Core Functions ---

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';

            let totalPrice = 0;
            let totalQty = 0;

            if (cart.length === 0) {
                container.innerHTML = '<div class="px-6 py-8 text-center text-gray-400">ไม่มีสินค้าในตะกร้า</div>';
            } else {
                cart.forEach((item, index) => {
                    totalPrice += item.price * item.quantity;
                    totalQty += item.quantity;

                    const row = document.createElement('div');
                    row.className = 'grid grid-cols-12 px-6 py-4 items-center border-b border-brand-tableBorder text-sm bg-white';
                    row.innerHTML = `
                        <div class="col-span-6 text-gray-800">${item.name}</div>
                        <div class="col-span-3 text-center text-brand-textMuted">${item.price} บาท</div>
                        <div class="col-span-3 flex justify-between items-center text-brand-textMuted px-4">
                            <span class="flex-1 text-center font-medium pr-4">${item.quantity}</span>
                            <button onclick="showDeleteModal(${index})" class="text-black hover:text-red-500 transition cursor-pointer">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    `;
                    container.appendChild(row);
                });
            }

            document.getElementById('cart-total-price').textContent = `${totalPrice} บาท`;
            document.getElementById('cart-total-qty').textContent = totalQty;
        }

        // --- Modal Functions ---
        function showDeleteModal(index) {
            itemToDeleteIndex = index; // บันทึกว่าต้องการลบ index ไหน
            deleteModal.classList.remove('hidden'); // แสดง Modal
        }

        function hideDeleteModal() {
            deleteModal.classList.add('hidden'); // ซ่อน Modal
            itemToDeleteIndex = null; // ล้างค่า
        }

        function confirmDelete() {
            if (itemToDeleteIndex !== null) {
                cart.splice(itemToDeleteIndex, 1); // ลบข้อมูลออกจาก Array
                renderCart(); // อัปเดตหน้าจอ
                hideDeleteModal(); // ซ่อน Modal
            }
        }

        // --- Navigation Functions ---
        function showSection(sectionName) {
            Object.values(sections).forEach(sec => sec.classList.add('hidden'));
            sections[sectionName].classList.remove('hidden');
        }

        function goToPayment() {
            if (cart.length === 0) {
                alert("ตะกร้าสินค้าว่างเปล่า กรุณาเลือกอาหารก่อน!");
                return;
            }

            const payContainer = document.getElementById('payment-items-container');
            payContainer.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                payContainer.innerHTML += `
                    <div class="flex justify-between items-start text-sm text-gray-800">
                        <div class="flex flex-col">
                            <span class="font-medium">${item.name}</span>
                            <span class="text-xs opacity-70">${item.quantity}x</span>
                        </div>
                        <span class="font-medium">฿ ${item.price * item.quantity}</span>
                    </div>
                `;
            });
            document.getElementById('payment-total-price').textContent = `฿ ${total}`;

            showSection('payment');
        }

        function goToCart() {
            resetPaymentUI();
            showSection('cart');
        }

        // --- Payment Success Logic ---
        function completePayment() {
            mainContainer.classList.remove('bg-brand-bgWhite');
            mainContainer.classList.add('bg-brand-bgSuccess');

            qrBg.classList.remove('bg-brand-qrBgPink');
            qrBg.classList.add('bg-brand-qrBgSuccess');

            qrFrame.classList.remove('bg-brand-qrFrameWhite');
            qrFrame.classList.add('bg-brand-qrFrameSuccess');

            simulateBtn.classList.add('hidden');
            backToHomeBtn.classList.remove('hidden');

            successOverlay.classList.remove('opacity-0', 'pointer-events-none');
            successIcon.classList.remove('scale-50');
            successIcon.classList.add('scale-100');
        }

        function resetPaymentUI() {
            mainContainer.classList.add('bg-brand-bgWhite');
            mainContainer.classList.remove('bg-brand-bgSuccess');

            qrBg.classList.add('bg-brand-qrBgPink');
            qrBg.classList.remove('bg-brand-qrBgSuccess');

            qrFrame.classList.add('bg-brand-qrFrameWhite');
            qrFrame.classList.remove('bg-brand-qrFrameSuccess');

            simulateBtn.classList.remove('hidden');
            backToHomeBtn.classList.add('hidden');

            successOverlay.classList.add('opacity-0', 'pointer-events-none');
            successIcon.classList.add('scale-50');
            successIcon.classList.remove('scale-100');
        }

        function resetApp() {
            cart = [{ id: 1, name: 'ผัดกะเพรา + หมูกรอบ + พิเศษ', price: 60, quantity: 1 }]; 
            renderCart();
            goToCart();
        }

        // Initialize
        renderCart();

    </script>
</body>
</html>
