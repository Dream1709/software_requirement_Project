<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกเมนูอาหาร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f9f7f2; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="text-center mb-8">
        <h1 class="text-xl font-bold text-gray-800">เลือกเมนู</h1>
    </header>

    <nav class="flex flex-wrap justify-center gap-2 mb-10">
        <button onclick="filterMenu('all')" class="px-4 py-1 text-sm rounded-full bg-white border border-gray-200 shadow-sm hover:bg-orange-100 transition">เมนูทั้งหมด</button>
        <button onclick="filterMenu('ตามสั่ง')" class="px-4 py-1 text-sm rounded-full bg-white border border-gray-200 shadow-sm hover:bg-orange-100 transition">เมนูตามสั่ง</button>
        <button onclick="filterMenu('ทอด')" class="px-4 py-1 text-sm rounded-full bg-white border border-gray-200 shadow-sm hover:bg-orange-100 transition">เมนูทอด</button>
        <button onclick="filterMenu('เส้น')" class="px-4 py-1 text-sm rounded-full bg-white border border-gray-200 shadow-sm hover:bg-orange-100 transition">เมนูเส้น</button>
        <button onclick="filterMenu('ยำ')" class="px-4 py-1 text-sm rounded-full bg-white border border-gray-200 shadow-sm hover:bg-orange-100 transition">เมนูยำ</button>
    </nav>

    <div id="menu-container" class="max-w-6xl mx-auto space-y-12">
        </div>

    <script>
        // ข้อมูลเมนู (จำลองจากภาพ)
        const menuData = [
            { id: 1, name: "ผัดกะเพรา", category: "ตามสั่ง", img: "https://placehold.co/400x300?text=Kaprao" },
            { id: 2, name: "ปีกไก่ทอด", category: "ทอด", img: "https://placehold.co/400x300?text=Fried+Chicken" },
            { id: 3, name: "ราดหน้า", category: "เส้น", img: "https://placehold.co/400x300?text=Rad+Na" },
            { id: 4, name: "ยำวุ้นเส้น", category: "ยำ", img: "https://placehold.co/400x300?text=Yum" },
            { id: 5, name: "ผัดคะน้า", category: "ตามสั่ง", img: "https://placehold.co/400x300?text=Kana" },
            { id: 6, name: "หมูทอด", category: "ทอด", img: "https://placehold.co/400x300?text=Fried+Pork" }
        ];

        function renderMenu(items) {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            // แบ่งกลุ่มตามหมวดหมู่เพื่อแสดง Header (เช่น เมนูตามสั่ง, เมนูทอด)
            const categories = [...new Set(items.map(i => i.category))];

            categories.forEach(cat => {
                const section = document.createElement('div');
                section.innerHTML = `
                    <h2 class="text-lg font-bold mb-4 border-b pb-2 text-gray-700">เมนู${cat}</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                        ${items.filter(i => i.category === cat).map(item => `
                            <div class="group cursor-pointer">
                                <div class="overflow-hidden rounded-xl shadow-sm bg-white aspect-square mb-2">
                                    <img src="${item.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                                </div>
                                <p class="text-sm text-gray-600 font-medium">${item.name}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function filterMenu(category) {
            if (category === 'all') {
                renderMenu(menuData);
            } else {
                const filtered = menuData.filter(item => item.category === category);
                renderMenu(filtered);
            }
        }

        // เริ่มต้นด้วยการแสดงทั้งหมด
        renderMenu(menuData);
    </script>
</body>
</html>
