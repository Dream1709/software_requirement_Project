// 2. นำมารวมกันเป็นตัวแปรเดียวเพื่อใช้ในฟังก์ชันหลัก
const menuData = [
    ...recommendedMenu,
    ...boilMenu,
    ...orderMenu,
    ...friedRiceMenu,
    ...friedMenu,
    ...namprikMenu,
    ...NoodleMenu,
    ...spicyMenu,
    
    // สามารถเพิ่มหมวดอื่นๆ ต่อท้ายได้เลยครับ
];

       function renderMenu(items) {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';

        const categories = [...new Set(items.map(i => i.category))];

        categories.forEach(cat => {
            const isRecommended = cat === 'เมนูแนะนำ';
            
            const section = document.createElement('div');
            section.className = "mb-10"; // ระยะห่างแต่ละหมวดหมู่
            
            section.innerHTML = `
                <h2 class="text-xl font-bold mb-4 text-gray-800 ml-2 flex items-center gap-2">
                    ${cat} 
                    ${isRecommended ? '' : ''} 
                    <span class="text-xs font-normal text-gray-400"></span>
                </h2>
                
                <div class="flex flex-nowrap overflow-x-auto gap-5 pb-6 no-scrollbar snap-x touch-pan-x">
                    ${items.filter(i => i.category === cat).map(item => `
                        <div class="flex-shrink-0 ${isRecommended ? 'w-52 md:w-64' : 'w-44 md:w-56'} snap-start group cursor-pointer">
                            <div class="overflow-hidden rounded-2xl shadow-md aspect-square mb-3 border-2 
                                ${isRecommended ? 'border-orange-300' : 'border-transparent'}">
                                <img src="${item.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                            </div>
                            <p class="text-sm md:text-base font-medium text-gray-700 px-1 truncate">
                                ${item.name}
                            </p>
                        </div>
                    `).join('')}
                    <div class="flex-shrink-0 w-6"></div>
                </div>
            `;
            container.appendChild(section);
        });
    }

    // ฟังก์ชันสำหรับกรองเมนู
    function filterMenu(category) {
        if (category === 'all') {
            renderMenu(menuData);
        } else {
            const filtered = menuData.filter(item => item.category === category);
            renderMenu(filtered);
        }
    }

    // เริ่มต้นแสดงผล
    renderMenu(menuData);
    </script>
