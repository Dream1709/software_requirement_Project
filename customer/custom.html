<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกรายละเอียดเมนู</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: {
                        brand: { orange:'#fd6e3b', darkOrange:'#e55a2b', inputBg:'#f8ece7', textMuted:'#b1745f', bgWhite:'#fcfbf9' }
                    }
                }
            }
        }
    </script>
    <style>
        input[type="radio"], input[type="checkbox"] { appearance:none; -webkit-appearance:none; }
        input[type="radio"]:checked + div,
        input[type="checkbox"]:checked + div { border-color:#fd6e3b !important; background-color:#FFF7ED; }
        input[type="radio"]:checked + div .radio-dot { border-color:#fd6e3b; background:#fd6e3b; }
        input[type="checkbox"]:checked + div .check-box { border-color:#fd6e3b; background-color:#fd6e3b; }
        input[type="checkbox"]:checked + div .check-box::after { content:'✓'; display:block; color:white; font-size:11px; text-align:center; line-height:18px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-28">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-3.5 flex items-center gap-3">
            <button onclick="window.location.href='/customer/menu.html'"
                class="flex items-center gap-2 text-gray-500 hover:text-brand-orange transition font-medium text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                ย้อนกลับ
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- Left: Options -->
        <div class="lg:col-span-2 space-y-7">
            <div>
                <span id="menu-category" class="text-xs text-brand-orange font-semibold uppercase tracking-wide"></span>
                <h1 id="menu-title" class="text-2xl font-bold text-gray-900 mt-1 mb-4"></h1>
                <div class="rounded-2xl overflow-hidden shadow-sm h-52 md:h-72 w-full">
                    <img id="menu-image" src="" alt="" class="w-full h-full object-cover bg-gray-100" onerror="this.style.opacity='0.3'">
                </div>
            </div>

            <!-- รูปแบบ ราดข้าว/กับข้าว -->
            <div id="style-section" class="hidden">
                <h2 class="font-bold text-gray-800 mb-3">รูปแบบ <span class="text-xs text-gray-400 font-normal">(เลือก 1 อย่าง)</span></h2>
                <div id="style-options" class="grid grid-cols-2 gap-3"></div>
            </div>

            <!-- ขนาด ธรรมดา/พิเศษ -->
            <div id="size-section" class="hidden">
                <h2 class="font-bold text-gray-800 mb-3">ขนาด <span class="text-xs text-gray-400 font-normal">(เลือก 1 อย่าง)</span></h2>
                <div id="size-options" class="grid grid-cols-2 gap-3"></div>
            </div>

            <!-- เนื้อสัตว์/ตัวเลือกหลัก -->
            <div id="meat-section" class="hidden">
                <h2 id="meat-label" class="font-bold text-gray-800 mb-3">เนื้อสัตว์ <span class="text-xs text-gray-400 font-normal">(เลือก 1 อย่าง)</span></h2>
                <div id="meat-options" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
            </div>

            <!-- เพิ่มเติม -->
            <div id="addon-section">
                <h2 class="font-bold text-gray-800 mb-3">เพิ่มเติม <span class="text-xs text-gray-400 font-normal">(เลือกได้หลายอย่าง)</span></h2>
                <div id="addon-options" class="grid grid-cols-2 gap-3"></div>
            </div>
        </div>

        <!-- Right: Summary -->
        <div class="lg:col-span-1">
            <div class="sticky top-20 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h2 class="font-bold text-gray-800 mb-4">สรุปรายการ</h2>
                <p id="summary-name" class="font-semibold text-gray-700 text-sm mb-3"></p>
                <div id="summary-details" class="space-y-2 text-sm text-gray-500 mb-4"></div>
                <div class="border-t border-gray-100 pt-4 flex justify-between items-center font-bold text-gray-900">
                    <span>ยอดรวม</span>
                    <span id="total-price" class="text-brand-orange text-xl">฿0</span>
                </div>
                <button id="add-btn"
                    class="mt-4 w-full bg-brand-orange hover:bg-brand-darkOrange text-white font-bold py-3.5 rounded-xl transition shadow-md active:scale-[0.98]">
                    เพิ่มลงตะกร้า
                </button>
            </div>
        </div>
    </main>

<script>
const params   = new URLSearchParams(window.location.search);
const menuId   = parseInt(params.get('id')) || 0;
const category = params.get('category') || '';
const menuName = params.get('name')     || '';
const basePrice= parseInt(params.get('price')) || 0;
const imgFromUrl = params.get('img') || ''; // path สั้นจาก system menu

// ดึงรูป: ถ้ามี img จาก URL (system menu) ใช้เลย / ถ้าไม่มีให้ดึง base64 จาก localStorage (admin menu)
function resolveMenuImg() {
    if (imgFromUrl) return imgFromUrl; // system menu path เช่น /รูปอาหาร/xxx.png
    const adminMenu = JSON.parse(localStorage.getItem('foodMenu')) || [];
    const found = adminMenu.find(m => m.id === menuId || m.name === menuName);
    return found ? (found.img || '') : '';
}

const menuImg = resolveMenuImg();

document.getElementById('menu-title').textContent    = menuName;
document.getElementById('summary-name').textContent  = menuName;
document.getElementById('menu-category').textContent = category;
document.getElementById('menu-image').src            = menuImg;

// ============= DATA =============

const boilMeats = {
    'แกงเขียวหวาน': [
        {n:'หมู',p:50},{n:'ไก่',p:50},{n:'ปลานิล',p:50},{n:'สามชั้น',p:50},
        {n:'รวมมิตร',p:60},{n:'หมูเด้ง',p:60},{n:'เนื้อ',p:60},{n:'กุ้ง',p:60},{n:'ดอลลี่',p:60},
    ],
    'ต้มยำ': [
        {n:'หมู',p:50},{n:'ไก่',p:50},{n:'ปลานิล',p:50},
        {n:'รวมมิตร',p:60},{n:'เนื้อ',p:60},{n:'กุ้ง',p:60},{n:'ดอลลี่',p:60},
    ],
    'แกงส้ม': [
        {n:'หมู',p:50},{n:'ไก่',p:50},{n:'ปลานิล',p:50},
        {n:'รวมมิตร',p:60},{n:'เนื้อ',p:60},{n:'กุ้ง',p:60},
    ],
    'ต้มข่า': [
        {n:'หมู',p:50},{n:'ไก่',p:50},{n:'ปลานิล',p:50},
        {n:'รวมมิตร',p:60},{n:'เนื้อ',p:60},{n:'กุ้ง',p:60},{n:'ดอลลี่',p:60},
    ],
};

const tomJued = [
    {n:'ต้มจืดเต้าหู้หมูสับ',p:40},{n:'ต้มจืดสาหร่ายหมูสับ',p:40},
    {n:'ต้มผักกาดดองหมูสับ',p:50},{n:'ต้มจืดรวมมิตรหมู',p:50},
];

const orderTiers = {
    t1: { names:['หมู','หมูสับ','ไก่','เครื่องในไก่'], radkao:{n:35,s:40}, gabkao:{n:50,s:60} },
    t2: { names:['ลูกชิ้น','ปลากรอบ','ปลานิล','ปลาดุก','ไข่เยี่ยวม้า','สามชั้น','ทะเล','หมึก','ปูอัด','หอยแมงภู่','หมูยอ','ตับหมู'], radkao:{n:40,s:45}, gabkao:{n:50,s:60} },
    t3: { names:['หมูกรอบ','เนื้อ','กุ้ง','รวมมิตร'], radkao:{n:45,s:50}, gabkao:{n:60,s:70} },
};
const allOrderMeats = [...orderTiers.t1.names,...orderTiers.t2.names,...orderTiers.t3.names];

const friedMap = {
    'ปีกไก่ทอด':{r:45,g:60},'หมูทอด':{r:45,g:60},'กุนเชียงทอด':{r:45,g:60},'หมูยอทอด':{r:45,g:60},
    'เนื้อทอด':{r:50,g:70},'กุ้งทอด':{r:50,g:70},'ดอลลี่ทอด':{r:50,g:70},
};

const yamMap = {
    'ยำวุ้นเส้นหมูสับ':50,'ยำปลากระป๋อง':50,'ยำหมูยอ':50,
    'ยำรวมมิตร':60,'ยำปลากรอบ':60,'ยำกุนเชียง':60,'ยำไข่ดาว':60,
};

const friceMap = {'ข้าวผัดไข่':30,'ข้าวผัดแหนม':40,'ข้าวผัดสัปรดแฮม':40,'ข้าวผัดไส้กรอก':40};

const spaghetti = [{n:'สปาเก็ตตี้ซอสเนื้อ',p:60},{n:'สปาเก็ตตี้คาโบนาล่า',p:60}];

// เนื้อสัตว์สำหรับ สุกี้ / ราดหน้า / ผัดไทย / ผัดซีอิ๊ว
const noodleMeats = [
    {n:'หมู'},{n:'ไก่'},{n:'ทะเล'},{n:'เนื้อ'},{n:'รวมมิตร'},{n:'หมูกรอบ'},
];
const noodleMenus = ['สุกี้','ราดหน้า','ผัดไทย','ผัดซีอิ้ว'];

// ============= HELPERS =============

function radioCard(label, val, group, checked=false, sub='') {
    return `<label class="cursor-pointer">
        <input type="radio" name="${group}" value="${val}" data-name="${label}" class="hidden" ${checked?'checked':''}>
        <div class="border-2 border-gray-200 rounded-xl p-3 flex items-start gap-2.5 bg-white transition h-full">
            <div class="radio-dot w-4 h-4 border-2 border-gray-300 rounded-full flex-shrink-0 mt-0.5 transition"></div>
            <div><p class="text-sm font-medium leading-tight">${label}</p>${sub?`<p class="text-xs text-brand-orange font-bold mt-0.5">${sub}</p>`:''}</div>
        </div>
    </label>`;
}

function checkCard(label, val, sub='') {
    return `<label class="cursor-pointer">
        <input type="checkbox" name="addon" value="${val}" data-name="${label}" class="hidden">
        <div class="border-2 border-gray-200 rounded-xl p-3 flex items-start gap-2.5 bg-white transition h-full">
            <div class="check-box w-4 h-4 border-2 border-gray-300 rounded flex-shrink-0 mt-0.5"></div>
            <div><p class="text-sm font-medium leading-tight">${label}</p>${sub?`<p class="text-xs text-brand-orange font-bold mt-0.5">${sub}</p>`:''}</div>
        </div>
    </label>`;
}

// ============= RESOLVE REAL CATEGORY =============
function getRealCat() {
    if (category !== 'เมนูแนะนำ') return category;
    const sysMenu = [
        {name:'แกงเขียวหวาน',cat:'เมนูต้มแกง'},{name:'ต้มยำ',cat:'เมนูต้มแกง'},{name:'แกงส้ม',cat:'เมนูต้มแกง'},
        {name:'ต้มข่า',cat:'เมนูต้มแกง'},{name:'ต้มจืด',cat:'เมนูต้มแกง'},
        {name:'ผัดกะเพรา',cat:'เมนูตามสั่ง'},{name:'ผัดคะน้า',cat:'เมนูตามสั่ง'},{name:'ราดพริก',cat:'เมนูตามสั่ง'},
        {name:'ผัดพริกเผา',cat:'เมนูตามสั่ง'},{name:'พะแนง',cat:'เมนูตามสั่ง'},{name:'พริกแกง',cat:'เมนูตามสั่ง'},
        {name:'ผัดเผ็ด',cat:'เมนูตามสั่ง'},{name:'ผัดฉ่า',cat:'เมนูตามสั่ง'},{name:'ผัดผงกะหรี่',cat:'เมนูตามสั่ง'},
        {name:'ทอดกะเทียม',cat:'เมนูตามสั่ง'},{name:'ผัดผักรวม',cat:'เมนูตามสั่ง'},{name:'ผัดพริกสด',cat:'เมนูตามสั่ง'},
        {name:'ไข่ยัดไส้',cat:'เมนูตามสั่ง'},
        {name:'ข้าวผัดไข่',cat:'เมนูข้าวผัด'},{name:'ข้าวผัดแหนม',cat:'เมนูข้าวผัด'},
        {name:'ข้าวผัดสัปรดแฮม',cat:'เมนูข้าวผัด'},{name:'ข้าวผัดไส้กรอก',cat:'เมนูข้าวผัด'},
        {name:'ปีกไก่ทอด',cat:'เมนูทอด'},{name:'หมูทอด',cat:'เมนูทอด'},{name:'กุนเชียงทอด',cat:'เมนูทอด'},
        {name:'หมูยอทอด',cat:'เมนูทอด'},{name:'เนื้อทอด',cat:'เมนูทอด'},{name:'กุ้งทอด',cat:'เมนูทอด'},{name:'ดอลลี่ทอด',cat:'เมนูทอด'},
        {name:'น้ำพริกกระปิ + ชะอมทอด',cat:'เมนูน้ำพริกกระปิ'},{name:'น้ำพริกกระปิ + ปลาทูทอด',cat:'เมนูน้ำพริกกระปิ'},
        {name:'น้ำพริกกระปิ + ปลานิลทอด',cat:'เมนูน้ำพริกกระปิ'},{name:'น้ำพริกกระปิ + ผักทอด',cat:'เมนูน้ำพริกกระปิ'},
        {name:'น้ำพริกกระปิ + มะเขือยาวทอด',cat:'เมนูน้ำพริกกระปิ'},
        {name:'ผัดมาม่า',cat:'เมนูเส้น'},{name:'สุกี้',cat:'เมนูเส้น'},{name:'ราดหน้า',cat:'เมนูเส้น'},
        {name:'ผัดไทย',cat:'เมนูเส้น'},{name:'ผัดซีอิ้ว',cat:'เมนูเส้น'},{name:'สปาเก็ตตี้',cat:'เมนูเส้น'},
        {name:'ยำวุ้นเส้นหมูสับ',cat:'เมนูยำ'},{name:'ยำปลากระป๋อง',cat:'เมนูยำ'},{name:'ยำหมูยอ',cat:'เมนูยำ'},
        {name:'ยำรวมมิตร',cat:'เมนูยำ'},{name:'ยำปลากรอบ',cat:'เมนูยำ'},{name:'ยำกุนเชียง',cat:'เมนูยำ'},{name:'ยำไข่ดาว',cat:'เมนูยำ'},
        {name:'ข้าวคลุกกะปิ',cat:'เมนูเพิ่มเติม'},
    ];
    const adminMenu = JSON.parse(localStorage.getItem('foodMenu')) || [];
    const found = [...sysMenu,...adminMenu.map(m=>({name:m.name,cat:m.category}))].find(m=>m.name===menuName);
    return found ? (found.cat || found.category) : 'เมนูตามสั่ง';
}

const realCat = getRealCat();

// ============= SETUP =============

// addon ทุกเมนู
document.getElementById('addon-options').innerHTML =
    checkCard('ไข่ดาว', 7,  '+฿7')  +
    checkCard('ไข่เจียว',10, '+฿10') +
    checkCard('ไข่ต้ม',  7,  '+฿7')  +
    checkCard('ข้าวเปล่า',5, '+฿5');

if (realCat === 'เมนูต้มแกง') {
    document.getElementById('meat-section').classList.remove('hidden');
    if (menuName === 'ต้มจืด') {
        document.getElementById('meat-label').innerHTML = 'เลือกประเภท <span class="text-xs text-gray-400 font-normal">(เลือก 1 อย่าง)</span>';
        document.getElementById('meat-options').innerHTML =
            tomJued.map((o,i) => radioCard(o.n, o.p, 'meat', i===0, `฿${o.p}`)).join('');
    } else {
        const meats = boilMeats[menuName] || boilMeats['แกงเขียวหวาน'];
        document.getElementById('meat-options').innerHTML =
            meats.map((m,i) => radioCard(m.n, m.p, 'meat', i===0, `฿${m.p}`)).join('');
    }
}
else if (realCat === 'เมนูตามสั่ง') {
    document.getElementById('style-section').classList.remove('hidden');
    document.getElementById('size-section').classList.remove('hidden');
    document.getElementById('meat-section').classList.remove('hidden');
    document.getElementById('style-options').innerHTML =
        radioCard('ราดข้าว','radkao','style',true) + radioCard('กับข้าว','gabkao','style');
    document.getElementById('size-options').innerHTML =
        radioCard('ธรรมดา','normal','size',true) + radioCard('พิเศษ','special','size');
    document.getElementById('meat-options').innerHTML =
        allOrderMeats.map((name,i) => {
            const tier = Object.values(orderTiers).find(t => t.names.includes(name));
            const style = (document.querySelector('input[name="style"]:checked') || {value:'radkao'}).value;
            const size  = (document.querySelector('input[name="size"]:checked')  || {value:'normal'}).value;
            const price = tier ? tier[style][size === 'special' ? 's' : 'n'] : 0;
            return radioCard(name, name, 'meat', i===0, `฿${price}`);
        }).join('');
}
else if (realCat === 'เมนูทอด') {
    document.getElementById('style-section').classList.remove('hidden');
    const p = friedMap[menuName] || {r:45,g:60};
    document.getElementById('style-options').innerHTML =
        radioCard('ราดข้าว','radkao','style',true,`฿${p.r}`) + radioCard('กับข้าว','gabkao','style',false,`฿${p.g}`);
}
else if (realCat === 'เมนูน้ำพริกกระปิ') {
    document.getElementById('style-section').classList.remove('hidden');
    document.getElementById('size-section').classList.remove('hidden');
    document.getElementById('style-options').innerHTML =
        radioCard('ราดข้าว','radkao','style',true,'฿45') + radioCard('กับข้าว','gabkao','style',false);
    document.getElementById('size-options').innerHTML =
        radioCard('ธรรมดา','normal','size',true) + radioCard('พิเศษ','special','size',false,'+฿10');
}
else if (realCat === 'เมนูเส้น') {
    document.getElementById('size-section').classList.remove('hidden');
    if (menuName === 'สปาเก็ตตี้') {
        document.getElementById('meat-section').classList.remove('hidden');
        document.getElementById('meat-label').innerHTML = 'เลือกประเภท <span class="text-xs text-gray-400 font-normal">(เลือก 1 อย่าง)</span>';
        document.getElementById('meat-options').innerHTML =
            spaghetti.map((o,i) => radioCard(o.n, o.p, 'meat', i===0, `฿${o.p}`)).join('');
        document.getElementById('size-options').innerHTML =
            radioCard('ธรรมดา','normal','size',true) + radioCard('พิเศษ','special','size',false,'+฿10');
    } else if (noodleMenus.includes(menuName)) {
        document.getElementById('meat-section').classList.remove('hidden');
        document.getElementById('meat-label').innerHTML = 'เนื้อสัตว์ <span class="text-xs text-gray-400 font-normal">(เลือก 1 อย่าง)</span>';
        document.getElementById('meat-options').innerHTML =
            noodleMeats.map((m,i) => radioCard(m.n, m.n, 'meat', i===0, `฿40`)).join('');
        document.getElementById('size-options').innerHTML =
            radioCard('ธรรมดา','normal','size',true,'฿40') + radioCard('พิเศษ','special','size',false,'฿50');
    } else {
        document.getElementById('size-options').innerHTML =
            radioCard('ธรรมดา','normal','size',true,'฿40') + radioCard('พิเศษ','special','size',false,'฿50');
    }
}

document.querySelectorAll('input[type="radio"],input[type="checkbox"]').forEach(el => {
    el.addEventListener('change', () => {
        // ถ้าเปลี่ยน style หรือ size ใน เมนูตามสั่ง ให้ re-render ราคาเนื้อสัตว์ด้วย
        if (realCat === 'เมนูตามสั่ง' && (el.name === 'style' || el.name === 'size')) {
            const selectedMeat = (document.querySelector('input[name="meat"]:checked') || {}).dataset?.name;
            document.getElementById('meat-options').innerHTML =
                allOrderMeats.map((name) => {
                    const tier  = Object.values(orderTiers).find(t => t.names.includes(name));
                    const style = (document.querySelector('input[name="style"]:checked') || {value:'radkao'}).value;
                    const size  = (document.querySelector('input[name="size"]:checked')  || {value:'normal'}).value;
                    const price = tier ? tier[style][size === 'special' ? 's' : 'n'] : 0;
                    const checked = name === selectedMeat;
                    return radioCard(name, name, 'meat', checked, `฿${price}`);
                }).join('');
            // ผูก event ใหม่กับ meat options ที่เพิ่งสร้าง
            document.querySelectorAll('input[name="meat"]').forEach(m => {
                m.addEventListener('change', updateSummary);
            });
        }
        updateSummary();
    });
});

// ============= PRICE =============

function getBasePrice() {
    if (realCat === 'เมนูยำ')          return yamMap[menuName]   || basePrice;
    if (realCat === 'เมนูข้าวผัด')     return friceMap[menuName] || basePrice;
    if (realCat === 'เมนูเพิ่มเติม')  return basePrice || 50;

    if (realCat === 'เมนูต้มแกง') {
        const sel = document.querySelector('input[name="meat"]:checked');
        return sel ? parseInt(sel.value) : 40;
    }
    if (realCat === 'เมนูตามสั่ง') {
        const m = document.querySelector('input[name="meat"]:checked');
        const st= document.querySelector('input[name="style"]:checked');
        const sz= document.querySelector('input[name="size"]:checked');
        if (!m) return 0;
        const tier = Object.values(orderTiers).find(t => t.names.includes(m.dataset.name));
        if (!tier) return 0;
        const style = st ? st.value : 'radkao';
        const size  = sz ? sz.value : 'normal';
        return tier[style][size === 'special' ? 's' : 'n'];
    }
    if (realCat === 'เมนูทอด') {
        const st = document.querySelector('input[name="style"]:checked');
        const p  = friedMap[menuName] || {r:45,g:60};
        return st ? (st.value === 'radkao' ? p.r : p.g) : p.r;
    }
    if (realCat === 'เมนูน้ำพริกกระปิ') {
        const st = document.querySelector('input[name="style"]:checked');
        const sz = document.querySelector('input[name="size"]:checked');
        if (!st || st.value === 'radkao') return 45;
        return sz && sz.value === 'special' ? 60 : 50;
    }
    if (realCat === 'เมนูเส้น') {
        if (menuName === 'สปาเก็ตตี้') {
            const m  = document.querySelector('input[name="meat"]:checked');
            const sz = document.querySelector('input[name="size"]:checked');
            const b  = m ? parseInt(m.value) : 60;
            return sz && sz.value === 'special' ? b + 10 : b;
        }
        if (noodleMenus.includes(menuName)) {
            const sz = document.querySelector('input[name="size"]:checked');
            return sz && sz.value === 'special' ? 50 : 40;
        }
        const sz = document.querySelector('input[name="size"]:checked');
        return sz && sz.value === 'special' ? 50 : 40;
    }
    return basePrice;
}

function updateSummary() {
    const details = document.getElementById('summary-details');
    details.innerHTML = '';
    let total = 0;

    const base = getBasePrice();
    total += base;
    details.innerHTML += `<div class="flex justify-between"><span>ราคาเมนู</span><span class="font-medium text-gray-700">฿${base}</span></div>`;

    document.querySelectorAll('input[name="addon"]:checked').forEach(cb => {
        const p = parseInt(cb.value);
        total += p;
        details.innerHTML += `<div class="flex justify-between text-gray-400"><span>+ ${cb.dataset.name}</span><span>฿${p}</span></div>`;
    });

    document.getElementById('total-price').textContent = `฿${total}`;
}

updateSummary();

// ============= ADD TO CART =============

document.getElementById('add-btn').addEventListener('click', () => {
    const total = parseInt(document.getElementById('total-price').textContent.replace('฿','')) || 0;
    let label = menuName;

    if (realCat === 'เมนูตามสั่ง') {
        const m  = document.querySelector('input[name="meat"]:checked');
        const st = document.querySelector('input[name="style"]:checked');
        const sz = document.querySelector('input[name="size"]:checked');
        if (m)  label += ` + ${m.dataset.name}`;
        if (st) label += ` (${st.value === 'radkao' ? 'ราดข้าว' : 'กับข้าว'})`;
        if (sz && sz.value === 'special') label += ' พิเศษ';
    } else if (realCat === 'เมนูต้มแกง') {
        const m = document.querySelector('input[name="meat"]:checked');
        if (m) label += ` + ${m.dataset.name}`;
    } else if (realCat === 'เมนูทอด') {
        const st = document.querySelector('input[name="style"]:checked');
        if (st) label += ` (${st.value === 'radkao' ? 'ราดข้าว' : 'กับข้าว'})`;
    } else if (realCat === 'เมนูน้ำพริกกระปิ') {
        const st = document.querySelector('input[name="style"]:checked');
        const sz = document.querySelector('input[name="size"]:checked');
        if (st) label += ` (${st.value === 'radkao' ? 'ราดข้าว' : 'กับข้าว'})`;
        if (sz && sz.value === 'special') label += ' พิเศษ';
    } else if (realCat === 'เมนูเส้น') {
        if (menuName === 'สปาเก็ตตี้') {
            const m = document.querySelector('input[name="meat"]:checked');
            if (m) label = m.dataset.name;
        } else if (noodleMenus.includes(menuName)) {
            const m  = document.querySelector('input[name="meat"]:checked');
            const sz = document.querySelector('input[name="size"]:checked');
            if (m) label += ` + ${m.dataset.name}`;
            if (sz && sz.value === 'special') label += ' พิเศษ';
        } else {
            const sz = document.querySelector('input[name="size"]:checked');
            if (sz && sz.value === 'special') label += ' พิเศษ';
        }
    }

    const addons = [...document.querySelectorAll('input[name="addon"]:checked')].map(cb => cb.dataset.name);
    if (addons.length) label += ` + ${addons.join(', ')}`;

    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const existing = cart.find(i => i.name === label && i.price === total);
    if (existing) existing.quantity++;
    else cart.push({ id: Date.now(), name: label, price: total, quantity: 1 });
    localStorage.setItem('cart', JSON.stringify(cart));
    window.location.href = '/customer/menu.html';
});
</script>
