<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกรายละเอียดเมนู</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'], },
                    colors: { orange: { 500: '#F97316', 600: '#EA580C', } }
                }
            }
        }
    </script>
    <style>
        /* ซ่อน Radio Button ดั้งเดิม แต่ให้คลิกได้ */
        input[type="radio"] { appearance: none; -webkit-appearance: none; }
        
        /* สไตล์เมื่อถูกเลือก (กรอบส้ม) */
        input[type="radio"]:checked + div { border-color: #F97316; background-color: #FFF7ED; }
        input[type="radio"]:checked + div .radio-circle { border-color: #F97316; background-color: transparent; }
        input[type="radio"]:checked + div .radio-circle::after {
            content: ''; display: block; width: 10px; height: 10px; background-color: #F97316; border-radius: 50%; margin: 3px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-20">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='/customer/menu.html'">
                <span class="text-xl font-bold">◀ ย้อนกลับ</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="flex flex-col">
                <span id="menu-category" class="text-sm text-orange-500 font-medium">หมวดหมู่</span>
                <h1 id="menu-title" class="text-3xl font-bold mb-4">ชื่อเมนู</h1>
            </div>
            
            <div class="rounded-xl overflow-hidden shadow-sm h-64 md:h-96 w-full relative group">
                <img id="menu-image" src="" alt="Food Image" class="w-full h-full object-cover transform group-hover:scale-105 transition duration-500 bg-gray-200">
            </div>

            <div id="style-section" style="display: none;">
                <h2 class="text-lg font-bold mb-4">รูปแบบ (เลือก 1 อย่าง)</h2>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer group">
                        <input type="radio" name="style" value="0" data-name="ราดข้าว" class="hidden" checked>
                        <div class="border border-gray-200 rounded-lg p-3 flex items-start gap-3 transition bg-white h-full">
                            <div class="radio-circle w-5 h-5 border-2 border-gray-300 rounded-full flex-shrink-0 mt-0.5"></div>
                            <span class="text-sm font-medium">ราดข้าว</span>
                        </div>
                    </label>
                    <label class="cursor-pointer group">
                        <input type="radio" name="style" value="10" data-name="เป็นกับข้าว" class="hidden">
                        <div class="border border-gray-200 rounded-lg p-3 flex items-start gap-3 transition bg-white h-full">
                            <div class="radio-circle w-5 h-5 border-2 border-gray-300 rounded-full flex-shrink-0 mt-0.5"></div>
                            <div class="flex flex-col">
                                <span class="text-sm font-medium">เป็นกับข้าว</span>
                                <span class="text-xs text-orange-600 font-bold">+ ฿10</span>
                            </div>
                        </div>
                    </label>
                </div>
                <hr class="border-gray-100 my-6">
            </div>

            <div id="size-section">
                <h2 class="text-lg font-bold mb-4">ขนาด (เลือก 1 อย่าง)</h2>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer group">
                        <input type="radio" name="size" value="0" data-name="ธรรมดา" class="hidden" checked>
                        <div class="border border-gray-200 rounded-lg p-3 flex items-start gap-3 transition bg-white h-full">
                            <div class="radio-circle w-5 h-5 border-2 border-gray-300 rounded-full flex-shrink-0 mt-0.5"></div>
                            <div class="flex flex-col">
                                <span class="text-sm font-medium">ธรรมดา</span>
                                <span id="base-price-label" class="text-xs text-orange-600 font-bold"></span>
                            </div>
                        </div>
                    </label>
                    <label class="cursor-pointer group">
                        <input type="radio" name="size" value="10" data-name="พิเศษ" class="hidden">
                        <div class="border border-gray-200 rounded-lg p-3 flex items-start gap-3 transition bg-white h-full">
                            <div class="radio-circle w-5 h-5 border-2 border-gray-300 rounded-full flex-shrink-0 mt-0.5"></div>
                            <div class="flex flex-col">
                                <span class="text-sm font-medium">พิเศษ</span>
                                <span class="text-xs text-orange-600 font-bold">+ ฿10</span>
                            </div>
                        </div>
                    </label>
                </div>
                <hr class="border-gray-100 my-6">
            </div>

            <div id="meat-section" style="display: none;">
                <h2 class="text-lg font-bold mb-4">เนื้อสัตว์ (เลือก 1 อย่าง)</h2>
                <div id="meat-options" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
                <hr class="border-gray-100 my-6">
            </div>

            <div id="addon-section" style="display: none;">
                <h2 class="text-lg font-bold mb-4">เพิ่มเติม (เลือก 1 อย่าง)</h2>
                <div class="space-y-3">
                    <label class="cursor-pointer block">
                        <input type="radio" name="addon" value="0" data-name="" class="hidden" checked>
                        <div class="border border-gray-200 rounded-lg p-3 flex items-center gap-3 transition bg-white">
                            <div class="radio-circle w-5 h-5 border-2 border-gray-300 rounded-full flex-shrink-0"></div>
                            <span class="text-sm text-gray-500">ไม่รับเพิ่มเติม</span>
                        </div>
                    </label>
                    <label class="cursor-pointer block">
                        <input type="radio" name="addon" value="7" data-name="ไข่ดาว" class="hidden">
                        <div class="border border-gray-200 rounded-lg p-3 flex items-center gap-3 transition bg-white">
                            <div class="radio-circle w-5 h-5 border-2 border-gray-300 rounded-full flex-shrink-0"></div>
                            <span class="text-sm">ไข่ดาว <span class="text-orange-600 font-medium">+ ฿7</span></span>
                        </div>
                    </label>
                    <label class="cursor-pointer block">
                        <input type="radio" name="addon" value="10" data-name="ไข่เจียว" class="hidden">
                        <div class="border border-gray-200 rounded-lg p-3 flex items-center gap-3 transition bg-white">
                            <div class="radio-circle w-5 h-5 border-2 border-gray-300 rounded-full flex-shrink-0"></div>
                            <span class="text-sm">ไข่เจียว <span class="text-orange-600 font-medium">+ ฿10</span></span>
                        </div>
                    </label>
                    <label class="cursor-pointer block">
                        <input type="radio" name="addon" value="7" data-name="ไข่ต้ม" class="hidden">
                        <div class="border border-gray-200 rounded-lg p-3 flex items-center gap-3 transition bg-white">
                            <div class="radio-circle w-5 h-5 border-2 border-gray-300 rounded-full flex-shrink-0"></div>
                            <span class="text-sm">ไข่ต้ม <span class="text-orange-600 font-medium">+ ฿7</span></span>
                        </div>
                    </label>
                </div>
            </div>

        </div>

        <div class="lg:col-span-1">
            <div class="sticky top-24 bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4">สรุปรายการสั่งซื้อ</h2>
                <div class="mb-6">
                    <p id="summary-title" class="text-sm font-bold text-gray-800 mb-2">กำลังโหลด...</p>
                    <div id="summary-details" class="text-sm space-y-2">
                        </div>
                </div>

                <div class="border-t border-gray-100 pt-4 mb-4">
                     <div class="flex justify-between font-bold text-lg">
                        <span>ยอดรวม</span>
                        <span id="total-price" class="text-orange-600">฿0</span>
                    </div>
                </div>

                <button id="add-to-cart-btn" class="w-full bg-orange-500 text-white font-bold py-3 rounded-lg transition hover:bg-orange-600 hover:shadow-lg">
                    เพิ่มลงตะกร้า
                </button>
            </div>
        </div>

    </main>

    <script>
        // 1. ดึงข้อมูลจาก URL
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category') || 'เมนูตามสั่ง'; // Default
        const menuName = urlParams.get('name') || 'เลือกเมนูของคุณ';
        const menuImg = urlParams.get('img') || 'https://images.unsplash.com/photo-1593967858208-67aaa5b28e6c?q=80&w=2000&auto=format&fit=crop';
        const basePrice = parseInt(urlParams.get('price')) || 0;

        // แสดงราคาธรรมดาที่ตัวเลือกขนาด
        // ถ้ามีวัตถุดิบให้เลือก ราคา "ธรรมดา" = 0 (ราคาอยู่ที่วัตถุดิบแล้ว)
        const categoriesWithMeat = ['เมนูต้มแกง', 'เมนูตามสั่ง', 'เมนูแนะนำ', 'เมนูเส้น'];
        const effectiveBasePrice = categoriesWithMeat.includes(category) ? 0 : basePrice;
        if (effectiveBasePrice > 0) {
            const label = document.getElementById('base-price-label');
            if (label) label.textContent = `฿${effectiveBasePrice}`;
        }

        // 2. แปะข้อมูลลงหน้าเว็บ
        document.getElementById('menu-title').textContent = menuName;
        document.getElementById('summary-title').textContent = menuName;
        document.getElementById('menu-category').textContent = category;
        document.getElementById('menu-image').src = menuImg;

        // 3. จัดการเปิด/ปิด หมวดหมู่ย่อย ตาม Category ที่ถูกส่งมา
        const styleSection = document.getElementById('style-section');
        const meatSection = document.getElementById('meat-section');
        const addonSection = document.getElementById('addon-section');

        // ---- ข้อมูลวัตถุดิบแยกตาม category ----
        const meatData = {
            'เมนูต้มแกง': [
                // แกงเขียวหวาน
                { name: 'หมู', price: 50 }, { name: 'ไก่', price: 50 }, { name: 'ปลานิล', price: 50 },
                { name: 'สามชั้น', price: 50 }, { name: 'รวมมิตร', price: 60 }, { name: 'หมูเด้ง', price: 60 },
                { name: 'เนื้อ', price: 60 }, { name: 'กุ้ง', price: 60 }, { name: 'ดอลลี่', price: 60 },
            ],
            'เมนูตามสั่ง': [
                { name: 'หมู', price: 35 }, { name: 'หมูสับ', price: 35 }, { name: 'ไก่', price: 35 },
                { name: 'เครื่องในไก่', price: 35 }, { name: 'หมูกรอบ', price: 45 }, { name: 'เนื้อ', price: 45 },
                { name: 'กุ้ง', price: 45 }, { name: 'รวมมิตร', price: 45 }, { name: 'ลูกชิ้น', price: 40 },
                { name: 'ปลากรอบ', price: 40 }, { name: 'ปลานิล', price: 40 }, { name: 'ปลาดุก', price: 40 },
                { name: 'ไข่เยียวม้า', price: 40 }, { name: 'สามชั้น', price: 40 }, { name: 'ทะเล', price: 40 },
                { name: 'หมึก', price: 40 }, { name: 'มูจัด', price: 40 }, { name: 'หอยแมงภู่', price: 40 },
                { name: 'หมูยอ', price: 40 }, { name: 'ตับหมู', price: 40 },
            ],
            'เมนูแนะนำ': [
                { name: 'หมู', price: 35 }, { name: 'หมูสับ', price: 35 }, { name: 'ไก่', price: 35 },
                { name: 'หมูกรอบ', price: 45 }, { name: 'เนื้อ', price: 45 }, { name: 'กุ้ง', price: 45 },
                { name: 'รวมมิตร', price: 45 },
            ],
            'เมนูเส้น': [
                { name: 'หมู', price: 40 }, { name: 'ไก่', price: 40 }, { name: 'ทะเล', price: 40 },
                { name: 'หมึก', price: 40 }, { name: 'เนื้อ', price: 50 }, { name: 'รวมมิตร', price: 50 },
                { name: 'หมูกรอบ', price: 50 },
            ],
        };

        // ฟังก์ชัน render วัตถุดิบ
        function renderMeatOptions(meats) {
            const container = document.getElementById('meat-options');
            container.innerHTML = meats.map((m, i) => `
                <label class="cursor-pointer group">
                    <input type="radio" name="meat" value="${m.price}" data-name="${m.name}" class="hidden" ${i === 0 ? 'checked' : ''}>
                    <div class="border border-gray-200 rounded-lg p-3 flex items-start gap-3 transition bg-white h-full">
                        <div class="radio-circle w-5 h-5 border-2 border-gray-300 rounded-full flex-shrink-0 mt-0.5"></div>
                        <div class="flex flex-col">
                            <span class="text-sm font-medium">${m.name}</span>
                            <span class="text-xs text-orange-600 font-bold">฿${m.price}</span>
                        </div>
                    </div>
                </label>
            `).join('');
            // ผูก event ใหม่
            container.querySelectorAll('input[type="radio"]').forEach(r => r.addEventListener('change', updateSummary));
        }

        // ตั้งค่าเริ่มต้น ปิดส่วนที่ไม่จำเป็นก่อน (ซ่อนเนื้อสัตว์, รูปแบบ, เพิ่มเติม)
        styleSection.style.display = 'none';
        meatSection.style.display = 'none';
        addonSection.style.display = 'none';

        if (['เมนูต้มแกง', 'เมนูตามสั่ง', 'เมนูแนะนำ'].includes(category)) {
            styleSection.style.display = 'block';
            meatSection.style.display = 'block';
            addonSection.style.display = 'block';
            renderMeatOptions(meatData[category] || meatData['เมนูตามสั่ง']);
        } 
        else if (['เมนูทอด', 'เมนูน้ำพริกกระปิ'].includes(category)) {
            styleSection.style.display = 'block';
            // เมนูทอด กับข้าว = +15
            const sideDishRadio = document.querySelector('input[name="style"][data-name="เป็นกับข้าว"]');
            const sideDishLabel = sideDishRadio ? sideDishRadio.nextElementSibling.querySelector('.text-xs') : null;
            if (sideDishRadio) sideDishRadio.value = '15';
            if (sideDishLabel) sideDishLabel.textContent = '+ ฿15';
        }
        else if (['เมนูเส้น'].includes(category)) {
            meatSection.style.display = 'block';
            addonSection.style.display = 'block';
            renderMeatOptions(meatData['เมนูเส้น']);
        }
        // เมนูยำ, เมนูข้าวผัด, เมนูเพิ่มเติม — แสดงแค่ขนาด

        // 4. ฟังก์ชันคำนวณและสรุปราคา
        function updateSummary() {
            const summaryDetails = document.getElementById('summary-details');
            const totalPriceEl = document.getElementById('total-price');
            let total = 0;
            summaryDetails.innerHTML = ''; 

            // 4.0 ราคาเริ่มต้นของเมนู (สำหรับหมวดที่มี basePrice เช่น ข้าวผัด)
            if (effectiveBasePrice > 0) {
                total += effectiveBasePrice;
                summaryDetails.innerHTML += `
                    <div class="flex justify-between text-gray-700">
                        <span>ราคาเมนู</span>
                        <span>฿${effectiveBasePrice}</span>
                    </div>`;
            }

            // 4.1 ตรวจสอบ เนื้อสัตว์ (ถ้ากำลังแสดงอยู่)
            if (meatSection.style.display !== 'none') {
                const meatObj = document.querySelector('input[name="meat"]:checked');
                if (meatObj) {
                    const name = meatObj.dataset.name;
                    const price = parseInt(meatObj.value);
                    total += price;
                    summaryDetails.innerHTML += `
                        <div class="flex justify-between text-gray-700">
                            <span>เนื้อสัตว์: ${name}</span>
                            <span>฿${price}</span>
                        </div>`;
                }
            }

            // 4.2 ตรวจสอบ รูปแบบ (ถ้ากำลังแสดงอยู่)
            if (styleSection.style.display !== 'none') {
                const styleObj = document.querySelector('input[name="style"]:checked');
                if (styleObj && parseInt(styleObj.value) > 0) {
                    const name = styleObj.dataset.name;
                    const price = parseInt(styleObj.value);
                    total += price;
                    summaryDetails.innerHTML += `
                        <div class="flex justify-between text-gray-500 text-xs">
                            <span>+ ${name}</span>
                            <span>฿${price}</span>
                        </div>`;
                }
            }

            // 4.3 ตรวจสอบ ขนาด (หมวดนี้แสดงอยู่เสมอ)
            const sizeObj = document.querySelector('input[name="size"]:checked');
            if (sizeObj && parseInt(sizeObj.value) > 0) {
                const name = sizeObj.dataset.name;
                const price = parseInt(sizeObj.value);
                total += price;
                summaryDetails.innerHTML += `
                    <div class="flex justify-between text-gray-500 text-xs">
                        <span>+ ขนาด: ${name}</span>
                        <span>฿${price}</span>
                    </div>`;
            }

            // 4.4 ตรวจสอบ เพิ่มเติม (ถ้ากำลังแสดงอยู่)
            if (addonSection.style.display !== 'none') {
                const addonObj = document.querySelector('input[name="addon"]:checked');
                if (addonObj && parseInt(addonObj.value) > 0) {
                    const name = addonObj.dataset.name;
                    const price = parseInt(addonObj.value);
                    total += price;
                    summaryDetails.innerHTML += `
                        <div class="flex justify-between text-gray-500 text-xs">
                            <span>+ เพิ่ม: ${name}</span>
                            <span>฿${price}</span>
                        </div>`;
                }
            }

            // อัปเดตยอดรวม
            totalPriceEl.textContent = `฿${total}`;
        }

        // 5. จับเหตุการณ์เมื่อลูกค้าคลิกเปลี่ยนตัวเลือก
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', updateSummary);
        });

        // คำนวณครั้งแรกเมื่อเปิดหน้า
        updateSummary();

        // 6. ปุ่มเพิ่มลงตะกร้า
        document.getElementById('add-to-cart-btn').addEventListener('click', () => {
            const totalPriceText = document.getElementById('total-price').textContent;
            const totalPrice = parseInt(totalPriceText.replace('฿', '')) || 0;

            // สร้างชื่อรายการรวมตัวเลือก
            let itemLabel = menuName;
            const meatChecked = document.querySelector('input[name="meat"]:checked');
            if (meatChecked && meatSection.style.display !== 'none') {
                itemLabel += ` + ${meatChecked.dataset.name}`;
            }
            const sizeChecked = document.querySelector('input[name="size"]:checked');
            if (sizeChecked && parseInt(sizeChecked.value) > 0) {
                itemLabel += ` + ${sizeChecked.dataset.name}`;
            }
            const addonChecked = document.querySelector('input[name="addon"]:checked');
            if (addonChecked && parseInt(addonChecked.value) > 0 && addonSection.style.display !== 'none') {
                itemLabel += ` + ${addonChecked.dataset.name}`;
            }

            // บันทึกลง localStorage
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            // เช็คว่ามีรายการนี้อยู่แล้วหรือไม่
            const existing = cart.find(i => i.name === itemLabel && i.price === totalPrice);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ id: Date.now(), name: itemLabel, price: totalPrice, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));

            // ไปหน้าตะกร้า
            window.location.href = '/customer/menu.html';
        });
    </script>
</body>
</html>
