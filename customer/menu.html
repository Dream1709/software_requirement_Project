<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกเมนูอาหาร - ร้านเพิ่มข้าว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f9f7f2; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Category tab active */
        .cat-tab { transition: all 0.2s ease; }
        .cat-tab.active {
            background: #fd6e3b;
            color: white;
            border-color: #fd6e3b;
            box-shadow: 0 4px 12px rgba(253,110,59,0.3);
        }

        /* Section header accent line */
        .section-accent {
            display: inline-block;
            width: 6px; height: 28px;
            border-radius: 4px;
            margin-right: 10px;
            flex-shrink: 0;
        }

        /* Card hover */
        .menu-card { transition: transform 0.18s ease, box-shadow 0.18s ease; }
        .menu-card:active { transform: scale(0.96); }

        /* Smooth scroll for anchor links */
        html { scroll-behavior: smooth; }

        /* Section background band */
        .section-band {
            border-radius: 20px;
            padding: 20px 16px 16px;
            margin-bottom: 28px;
        }

        /* Sticky nav shadow */
        .sticky-nav {
            position: sticky;
            top: 64px;
            z-index: 20;
            background: #f9f7f2;
            padding: 10px 0 8px;
            border-bottom: 1px solid #ede9e0;
        }

        /* Badge for item count */
        .item-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px;
            border-radius: 50%;
            font-size: 10px; font-weight: 700;
            margin-left: 5px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.35s ease forwards; }
    </style>
</head>

            <span>ร้านเพิ่มข้าว</span>
        </div>

        <button onclick="window.location.href='/customer/Shopping_cart.html'"

            </svg>
            <span id="cart-count" class="text-sm font-bold text-orange-500">0</span>
        </button>
    </header>

    <!-- ===== CATEGORY TABS (sticky) ===== -->
    <div class="sticky-nav px-4">
        <div id="cat-tabs" class="flex gap-2 overflow-x-auto no-scrollbar">
            <!-- rendered by JS -->
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->

        <!-- rendered by JS -->

    <!-- ===== CHANGE TABLE MODAL ===== -->
    <div id="change-table-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 w-[90%] max-w-sm shadow-2xl flex flex-col items-center">

                </svg>

            <h3 class="text-xl font-bold text-gray-900 mb-1">ออกจากโต๊ะนี้?</h3>

        'เมนูแนะนำ':        { accent: '#fd6e3b', bg: '#fff4ef', emoji: '⭐' },
        'เมนูต้มแกง':       { accent: '#e8734a', bg: '#fff5f0', emoji: '🍲' },
        'เมนูตามสั่ง':      { accent: '#d97706', bg: '#fffbeb', emoji: '🍳' },
        'เมนูข้าวผัด':      { accent: '#b45309', bg: '#fef3c7', emoji: '🍚' },
        'เมนูทอด':          { accent: '#c2410c', bg: '#fff7ed', emoji: '🍗' },
        'เมนูน้ำพริกกระปิ': { accent: '#7c3aed', bg: '#f5f3ff', emoji: '🌶️' },
        'เมนูเส้น':         { accent: '#0891b2', bg: '#ecfeff', emoji: '🍜' },
        'เมนูยำ':           { accent: '#059669', bg: '#ecfdf5', emoji: '🥗' },
        'เมนูเพิ่มเติม':    { accent: '#6b7280', bg: '#f9fafb', emoji: '➕' },
    };
    const DEFAULT_CFG = { accent: '#fd6e3b', bg: '#fff4ef', emoji: '🍽️' };

    const allDefaultMenu = [
        ...boilMenu, ...orderMenu, ...friedRiceMenu, ...friedMenu,
        ...namprikMenu, ...NoodleMenu, ...spicyMenu, ...extraMenu
    ];

    function buildTotalMenu() {
        const adminMenu = JSON.parse(localStorage.getItem('foodMenu')) || [];
        const baseMenu  = [...allDefaultMenu, ...adminMenu];
        const recIds    = JSON.parse(localStorage.getItem('recommendedIds')) || [8, 4, 25];
        const recItems  = recIds
            .map(id => baseMenu.find(m => m.id === id))
            .filter(Boolean)
            .map(m => ({ ...m, category: 'เมนูแนะนำ' }));
        return [...recItems, ...baseMenu];
    }

    // ===================== RENDER TABS =====================
    function renderTabs(categories, activeCategory) {
        const wrap = document.getElementById('cat-tabs');
        wrap.innerHTML = '';
        const allBtn = document.createElement('button');
        allBtn.className = `cat-tab flex-shrink-0 px-4 py-2 rounded-full border border-gray-200 bg-white text-sm font-medium text-gray-600 ${activeCategory === 'all' ? 'active' : ''}`;
        allBtn.textContent = 'ทั้งหมด';
        allBtn.onclick = () => renderAll();
        wrap.appendChild(allBtn);

        categories.forEach(cat => {
            const cfg = CAT_CONFIG[cat] || DEFAULT_CFG;
            const btn = document.createElement('button');
            btn.className = `cat-tab flex-shrink-0 px-4 py-2 rounded-full border border-gray-200 bg-white text-sm font-medium text-gray-600 ${activeCategory === cat ? 'active' : ''}`;
            btn.innerHTML = `${cfg.emoji} ${cat.replace('เมนู', '')}`;
            btn.onclick = () => scrollToSection(cat);
            wrap.appendChild(btn);
        });
    }

    // ===================== RENDER SECTIONS =====================
    function renderAll() {
        const total = buildTotalMenu();
        const container = document.getElementById('menu-container');
        container.innerHTML = '';

        const categories = [...new Set(total.map(item => item.category))];
        renderTabs(categories, 'all');

        categories.forEach((cat, idx) => {
            const items = total.filter(item => item.category === cat);
            const cfg   = CAT_CONFIG[cat] || DEFAULT_CFG;

            const section = document.createElement('div');
            section.id    = `sec-${cat}`;
            section.className = 'fade-up mb-8';
            section.style.animationDelay = `${idx * 0.04}s`;
            section.style.opacity = '0';

            // horizontal scroll for แนะนำ, grid for others
            const isRec = cat === 'เมนูแนะนำ';

            const cardHtml = items.map(item => isRec
                ? `<div class="flex-shrink-0 w-36 menu-card cursor-pointer"
                        onclick="goToCustom(${item.id},'${encodeURIComponent(item.name)}','${encodeURIComponent(item.category)}',${item.price||0},'${(item.img||'').startsWith('data:') ? '' : encodeURIComponent(item.img||'')}')">
                        <div class="rounded-2xl overflow-hidden aspect-square shadow-sm">
                            <img src="${item.img}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-sm font-semibold mt-2 leading-tight">${item.name}</p>
                        ${item.price ? `<p class="text-xs font-bold mt-0.5" style="color:${cfg.accent}">฿${item.price}.-</p>` : ''}
                   </div>`
                : `<div class="menu-card cursor-pointer"
                        onclick="goToCustom(${item.id},'${encodeURIComponent(item.name)}','${encodeURIComponent(item.category)}',${item.price||0},'${(item.img||'').startsWith('data:') ? '' : encodeURIComponent(item.img||'')}')">
                        <div class="rounded-2xl overflow-hidden aspect-square shadow-sm">
                            <img src="${item.img}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-sm font-semibold mt-2 leading-tight text-gray-800">${item.name}</p>
                        ${item.price ? `<p class="text-xs font-bold mt-0.5" style="color:${cfg.accent}">฿${item.price}.-</p>` : ''}
                   </div>`
            ).join('');

            const listHtml = isRec
                ? `<div class="flex gap-4 overflow-x-auto no-scrollbar pb-3">${cardHtml}</div>`
                : `<div class="grid grid-cols-3 sm:grid-cols-4 gap-3">${cardHtml}</div>`;

            section.innerHTML = `
                <div class="section-band" style="background:${cfg.bg}">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <span class="section-accent" style="background:${cfg.accent}"></span>
                            <span class="text-base font-bold text-gray-800">${cfg.emoji} ${cat}</span>
                        </div>
                        <span class="item-badge text-white text-xs" style="background:${cfg.accent}">${items.length}</span>
                    </div>
                    ${listHtml}
                </div>
            `;
            container.appendChild(section);
        });

        // intersect observer for active tab highlight while scrolling
        setupScrollSpy(categories);
    }

    // ===================== SCROLL SPY =====================
    function setupScrollSpy(categories) {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const cat = entry.target.id.replace('sec-', '');
                    document.querySelectorAll('.cat-tab').forEach(btn => {
                        const match = btn.textContent.includes(cat.replace('เมนู','')) || btn.textContent === 'ทั้งหมด';
                        // only highlight exact match
                        const btnCat = categories.find(c => btn.innerHTML.includes(c.replace('เมนู','')));
                        if (btnCat === cat) {
                            btn.classList.add('active');
                        } else if (btnCat) {
                            btn.classList.remove('active');
                        }
                    });
                }
            });
        }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });

        categories.forEach(cat => {
            const el = document.getElementById(`sec-${cat}`);
            if (el) observer.observe(el);
        });
    }

    function scrollToSection(cat) {
        const el = document.getElementById(`sec-${cat}`);
        if (!el) return;
        const offset = 130; // header + tabs height
        const top = el.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top, behavior: 'smooth' });
    }

    // ===================== CART / NAV =====================
    function updateCartCount() {
        const cart  = JSON.parse(localStorage.getItem('cart')) || [];
        const total = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cart-count').textContent = total;
    }

    function goToCustom(id, name, cat, price, img) {
        window.location.href = '/customer/custom.html?id=' + id
            + '&name=' + name
            + '&category=' + cat
            + '&price=' + price
            + (img ? '&img=' + img : '');
    }

    function showChangeTableModal() {
        document.getElementById('change-table-modal').classList.remove('hidden');
    }
    function hideChangeTableModal() {
        document.getElementById('change-table-modal').classList.add('hidden');
    }
    function confirmChangeTable() {
        localStorage.removeItem('cart');
        localStorage.removeItem('customerInfo');
        window.location.href = '/customer/index.html';
    }

    // ===================== INIT =====================
    window.onload = function() {
        renderAll();
        updateCartCount();
    };
</script>
</body>
</html>
