<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตะกร้าสินค้า - ร้านเพิ่มข้าว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: {
                        brand: {
                            orange: '#fd6e3b',
                            darkOrange: '#e55a2b',
                            inputBg: '#f8ece7',
                            textMuted: '#b1745f',
                            bgWhite: '#fcfbf9'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .success-scale { animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes scaleUp { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-brand-bgWhite min-h-screen font-sans">

    <div class="w-full bg-brand-bgWhite min-h-screen flex flex-col relative" id="main-container">

        <!-- ===== CART SECTION ===== -->
        <div id="cart-section">

            <!-- Header -->
            <div class="px-8 py-5 border-b border-gray-100 bg-white flex items-center justify-between sticky top-0 z-10">
                <div class="flex items-center gap-2">
                    <button onclick="window.location.href='/customer/menu.html'" class="text-gray-400 hover:text-gray-600 transition mr-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <span class="text-xl leading-none text-gray-800">✦</span>
                    <span class="font-bold text-gray-800 text-lg">ตะกร้าสินค้า</span>
                </div>
                <span id="header-qty" class="text-sm text-brand-textMuted font-medium"></span>
            </div>

            <div class="p-6 flex-1">

                <!-- Customer Info -->
                <div class="flex items-center gap-3 bg-brand-inputBg rounded-2xl px-5 py-4 mb-6">
                    <div class="w-10 h-10 bg-brand-orange rounded-full flex items-center justify-center text-white text-lg flex-shrink-0">✦</div>
                    <div>
                        <p class="font-semibold text-gray-800 text-sm" id="customer-name-display">กำลังโหลด...</p>
                        <p class="text-brand-textMuted text-xs" id="table-display">โต๊ะ: -</p>
                    </div>
                </div>

                <!-- Cart Items -->
                <div id="cart-items-container" class="space-y-3 mb-6"></div>

                <!-- Empty State -->
                <div id="empty-cart" class="hidden text-center py-16 text-gray-300">
                    <div class="text-6xl mb-4">🛒</div>
                    <p class="font-medium text-sm">ตะกร้าว่างเปล่า</p>
                    <p class="text-xs mt-1">กลับไปเลือกเมนูที่ชอบได้เลย</p>
                </div>

                <!-- Summary -->
                <div id="cart-summary" class="bg-brand-inputBg rounded-2xl px-5 py-4 mb-6">
                    <div class="flex justify-between items-center text-sm text-brand-textMuted mb-2">
                        <span>จำนวนรายการ</span>
                        <span id="cart-total-qty">0 รายการ</span>
                    </div>
                    <div class="flex justify-between items-center font-bold text-gray-800">
                        <span>ยอดรวมทั้งหมด</span>
                        <span id="cart-total-price" class="text-brand-orange text-lg">฿0</span>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="flex gap-3">
                    <button onclick="window.location.href='/customer/menu.html'"
                        class="flex-1 py-4 bg-brand-inputBg text-brand-textMuted font-bold rounded-2xl text-sm hover:bg-orange-100 transition active:scale-[0.98]">
                        + เพิ่มเมนู
                    </button>
                    <button onclick="goToPayment()"
                        class="flex-2 px-8 py-4 bg-brand-orange hover:bg-brand-darkOrange text-white font-bold rounded-2xl text-sm shadow-lg transition active:scale-[0.98]">
                        ส่งออเดอร์ →
                    </button>
                </div>

            </div>
        </div>

        <!-- ===== PAYMENT SECTION ===== -->
        <div id="payment-section" class="hidden flex-col min-h-screen">

            <!-- Header -->
            <div class="px-8 py-5 border-b border-gray-100 bg-white flex items-center justify-between sticky top-0 z-10">
                <div class="flex items-center gap-2">
                    <button onclick="goToCart()" class="text-gray-400 hover:text-gray-600 transition mr-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <span class="text-xl leading-none text-gray-800">✦</span>
                    <span class="font-bold text-gray-800 text-lg">ชำระเงิน</span>
                </div>
                <button id="back-to-home-btn" onclick="resetApp()" class="hidden text-xs text-brand-textMuted hover:text-brand-orange transition font-medium">
                    กลับหน้าแรก
                </button>
            </div>

            <div class="p-6 flex-1">

                <!-- Order Summary -->
                <div class="bg-brand-inputBg rounded-2xl p-5 mb-6">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-sm font-bold text-gray-800">สรุปรายการ</span>
                        <span class="text-xs text-brand-textMuted" id="payment-customer-info"></span>
                    </div>
                    <div id="payment-items-container" class="space-y-2 mb-4 pb-4 border-b border-brand-textMuted/20"></div>
                    <div class="flex justify-between items-center font-bold text-gray-800">
                        <span>ยอดรวม</span>
                        <span id="payment-total-price" class="text-brand-orange text-lg">฿0</span>
                    </div>
                </div>

                <!-- QR Code -->
                <div class="flex flex-col items-center">
                    <p class="text-sm text-gray-500 mb-5">สแกน QR Code เพื่อชำระเงิน</p>

                    <div id="qr-wrapper" class="bg-brand-inputBg p-6 rounded-[2.5rem] shadow-sm transition-colors duration-500 w-full max-w-[280px]">
                        <div class="bg-white rounded-2xl p-4 shadow-inner">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/QR_code_for_mobile_English_Wikipedia.svg/1200px-QR_code_for_mobile_English_Wikipedia.svg.png"
                                alt="QR Code" class="w-full aspect-square object-contain">
                        </div>
                    </div>

                    <button id="simulate-btn" onclick="completePayment()"
                        class="mt-6 px-6 py-3 bg-gray-800 hover:bg-black text-white text-sm font-medium rounded-2xl transition shadow-sm active:scale-[0.98]">
                        (จำลอง) สแกนจ่ายสำเร็จ
                    </button>
                </div>

            </div>

            <!-- Success Overlay -->
            <div id="success-overlay" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-brand-bgWhite/95 backdrop-blur-sm">
                <div id="success-icon" class="w-28 h-28 bg-green-100 rounded-full flex items-center justify-center mb-6 success-scale">
                    <svg class="w-16 h-16 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">ส่งออเดอร์แล้ว!</h2>
                <p class="text-brand-textMuted text-sm mb-8">ขอบคุณที่ใช้บริการร้านเพิ่มข้าว</p>
                <button onclick="resetApp()"
                    class="px-8 py-4 bg-brand-orange hover:bg-brand-darkOrange text-white font-bold rounded-2xl shadow-lg transition active:scale-[0.98]">
                    กลับหน้าแรก
                </button>
            </div>

        </div>

    </div>

    <!-- Delete Modal -->
    <div id="delete-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 w-[90%] max-w-sm shadow-2xl flex flex-col items-center">
            <div class="w-14 h-14 bg-brand-inputBg rounded-full flex items-center justify-center mb-4">
                <svg class="w-7 h-7 text-brand-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-1">ลบรายการนี้?</h3>
            <p class="text-gray-400 text-sm mb-6 text-center">รายการนี้จะถูกนำออกจากตะกร้า</p>
            <div class="flex gap-3 w-full">
                <button onclick="hideDeleteModal()" class="flex-1 py-3 rounded-2xl bg-brand-inputBg text-brand-textMuted font-bold text-sm hover:bg-orange-100 transition">ยกเลิก</button>
                <button onclick="confirmDelete()" class="flex-1 py-3 rounded-2xl bg-brand-orange hover:bg-brand-darkOrange text-white font-bold text-sm transition">ลบ</button>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const customerInfo = JSON.parse(localStorage.getItem('customerInfo')) || {};
        let itemToDeleteIndex = null;

        // แสดงข้อมูลลูกค้า
        document.getElementById('customer-name-display').textContent = customerInfo.name ? 'สวัสดี, ' + customerInfo.name : 'ลูกค้า';
        document.getElementById('table-display').textContent = 'โต๊ะ ' + (customerInfo.table || '-');
        document.getElementById('payment-customer-info').textContent = customerInfo.name ? '· ' + customerInfo.name + ' โต๊ะ ' + customerInfo.table : '';

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const emptyCart = document.getElementById('empty-cart');
            const summary = document.getElementById('cart-summary');
            container.innerHTML = '';

            let totalPrice = 0;
            let totalQty = 0;

            if (cart.length === 0) {
                emptyCart.classList.remove('hidden');
                summary.classList.add('hidden');
            } else {
                emptyCart.classList.add('hidden');
                summary.classList.remove('hidden');

                cart.forEach((item, index) => {
                    totalPrice += item.price * item.quantity;
                    totalQty += item.quantity;

                    const div = document.createElement('div');
                    div.className = 'fade-in flex items-center gap-3 bg-white rounded-2xl px-5 py-4 shadow-sm border border-gray-100';
                    div.style.animationDelay = `${index * 0.05}s`;
                    div.innerHTML = `
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-800 truncate">${item.name}</p>
                            <p class="text-xs text-brand-textMuted mt-0.5">฿${item.price} × ${item.quantity}</p>
                        </div>
                        <span class="font-bold text-gray-800 text-sm flex-shrink-0">฿${item.price * item.quantity}</span>
                        <button onclick="showDeleteModal(${index})" class="text-gray-300 hover:text-red-400 transition flex-shrink-0 ml-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    `;
                    container.appendChild(div);
                });
            }

            document.getElementById('cart-total-price').textContent = '฿' + totalPrice.toLocaleString();
            document.getElementById('cart-total-qty').textContent = totalQty + ' รายการ';
            document.getElementById('header-qty').textContent = totalQty > 0 ? totalQty + ' รายการ' : '';
        }

        function showDeleteModal(index) {
            itemToDeleteIndex = index;
            document.getElementById('delete-modal').classList.remove('hidden');
        }

        function hideDeleteModal() {
            itemToDeleteIndex = null;
            document.getElementById('delete-modal').classList.add('hidden');
        }

        function confirmDelete() {
            if (itemToDeleteIndex !== null) {
                cart.splice(itemToDeleteIndex, 1);
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
                hideDeleteModal();
            }
        }

        function showSection(name) {
            document.getElementById('cart-section').classList.toggle('hidden', name !== 'cart');
            const payEl = document.getElementById('payment-section');
            payEl.classList.toggle('hidden', name !== 'payment');
            payEl.classList.toggle('flex', name === 'payment');
        }

        function goToPayment() {
            if (cart.length === 0) {
                alert('ตะกร้าว่างเปล่า กรุณาเลือกเมนูก่อนครับ');
                return;
            }

            const payContainer = document.getElementById('payment-items-container');
            payContainer.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                payContainer.innerHTML += `
                    <div class="flex justify-between items-center text-sm">
                        <div>
                            <span class="text-gray-700 font-medium">${item.name}</span>
                            <span class="text-brand-textMuted text-xs ml-2">${item.quantity}x</span>
                        </div>
                        <span class="font-medium text-gray-800">฿${item.price * item.quantity}</span>
                    </div>
                `;
            });

            document.getElementById('payment-total-price').textContent = '฿' + total.toLocaleString();

            // บันทึกออเดอร์ให้ admin
            const _now = new Date();
            const _dateKey = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;
            const newOrder = {
                id: Date.now(),
                customerName: customerInfo.name || 'ไม่ระบุ',
                table: customerInfo.table || '-',
                items: cart.map(i => ({ name: i.name, price: i.price, quantity: i.quantity })),
                total: total,
                dateKey: _dateKey,
                time: _now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
            };
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.unshift(newOrder);
            localStorage.setItem('orders', JSON.stringify(orders));

            showSection('payment');
        }

        function goToCart() {
            document.getElementById('success-overlay').classList.add('hidden');
            document.getElementById('simulate-btn').classList.remove('hidden');
            document.getElementById('back-to-home-btn').classList.add('hidden');
            showSection('cart');
        }

        function completePayment() {
            document.getElementById('simulate-btn').classList.add('hidden');
            document.getElementById('back-to-home-btn').classList.remove('hidden');
            document.getElementById('qr-wrapper').classList.add('opacity-30');

            const overlay = document.getElementById('success-overlay');
            overlay.classList.remove('hidden');
        }

        function resetApp() {
            localStorage.removeItem('cart');
            window.location.href = '/customer/menu.html';
        }

        renderCart();
    </script>
</body>
</html>
