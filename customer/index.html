<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยินดีต้อนรับ - ร้านเพิ่มข้าว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'], },
                    colors: {
                        brand: {
                            orange: '#fd6e3b',
                            darkOrange: '#e55a2b',
                            inputBg: '#f8ece7',
                            textMuted: '#b1745f',
                            bgWhite: '#fcfbf9'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen font-sans">

    <div class="w-full  bg-brand-bgWhite shadow-sm relative overflow-hidden min-h-screen flex flex-col">
        
        <div class="px-8 py-5 border-b border-gray-100 bg-white flex justify-between items-center sticky top-0 z-10">
            <div class="flex items-center gap-2 text-gray-800 font-bold text-lg">
                <span class="text-xl leading-none mt-0.5">✦</span>
                <span>ร้านเพิ่มข้าว</span>
            </div>
            <button onclick="window.location.href='/admin/login.html'" class="text-xs text-brand-textMuted hover:text-brand-orange transition font-medium">
                เข้าสู่ระบบ Admin
            </button>
        </div>

        <div class="p-8 md:p-12 flex-1 flex flex-col items-center">
            
            <div class="w-full max-w-4xl">
                <div class="w-full h-[220px] md:h-[320px] rounded-[2.5rem] overflow-hidden shadow-sm mb-10">
                    <img src="https://images.unsplash.com/photo-1559314809-0d155014e29e?q=80&w=2000&auto=format&fit=crop" alt="ร้านเพิ่มข้าว" class="w-full h-full object-cover">
                </div>

                <div class="w-full max-w-md mx-auto text-center">
                    <h1 class="text-2xl font-bold text-gray-900 mb-2">ยินดีต้อนรับสู่ร้านเพิ่มข้าว</h1>
                    <p class="text-brand-textMuted text-sm mb-8 font-medium">กรุณาระบุข้อมูลเพื่อเริ่มต้นสั่งอาหาร</p>
                    
                    <form id="customer-form" class="space-y-5 text-left" onsubmit="startOrdering(event)">
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-2 ml-1">ชื่อลูกค้า</label>
                            <input type="text" id="customer-name" placeholder="ระบุชื่อของคุณ..." required 
                                class="w-full bg-brand-inputBg text-gray-800 placeholder-brand-textMuted/60 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-brand-orange/50 transition font-medium">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-2 ml-1">เลขโต๊ะ</label>
                            <select id="table-number" required 
                                class="w-full bg-brand-inputBg text-gray-800 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-brand-orange/50 transition font-medium appearance-none cursor-pointer">
                                <option value="" disabled selected>กรุณาเลือกโต๊ะ</option>
                                <option value="1">โต๊ะ 1</option>
                                <option value="2">โต๊ะ 2</option>
                                <option value="3">โต๊ะ 3</option>
                                <option value="4">โต๊ะ 4</option>
                                <option value="5">โต๊ะ 5</option>
                                <option value="6">โต๊ะ 6</option>
                                <option value="7">โต๊ะ 7</option>
                                <option value="8">โต๊ะ 8</option>
                                <option value="9">โต๊ะ 9</option>
                                <option value="10">โต๊ะ 10</option>
                            </select>
                        </div>

                        <div class="pt-4">
                            <button type="submit" class="w-full bg-brand-orange hover:bg-brand-darkOrange text-white font-bold rounded-2xl px-5 py-5 transition shadow-lg transform active:scale-[0.98]">
                                เริ่มสั่งอาหาร
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function startOrdering(event) {
            event.preventDefault();
            const customerName = document.getElementById('customer-name').value;
            const tableNumber = document.getElementById('table-number').value;

            // เก็บข้อมูลลง localStorage เพื่อไปใช้ในหน้าเมนูหรือตะกร้า
            localStorage.setItem('customerInfo', JSON.stringify({
                name: customerName,
                table: tableNumber
            }));

            // ไปที่หน้าเลือกเมนู
            window.location.href = '/customer/menu.html';
        }
    </script>
</body>
</html>
