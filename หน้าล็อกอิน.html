<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900&amp;family=Plus+Jakarta+Sans%3Awght%40400%3B500%3B700%3B800"
    />

    <title>Stitch Design</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body>
    <div
      class="relative flex h-auto min-h-screen w-full flex-col bg-[#fcf9f8] group/design-root overflow-x-hidden"
      style='font-family: "Plus Jakarta Sans", "Noto Sans", sans-serif;'
    >
      <div class="layout-container flex h-full grow flex-col">
        <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-[#f4eae6] px-10 py-3">
          <div class="flex items-center gap-4 text-[#1d110c]">
            <div class="size-4">
              <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z"
                  fill="currentColor"
                ></path>
              </svg>
            </div>
            <h2 class="text-[#1d110c] text-lg font-bold leading-tight tracking-[-0.015em]">ล็อกอิน</h2>
          </div>
          <div class="flex flex-1 justify-end gap-8">
            <div class="flex items-center gap-9">
              <a class="text-[#1d110c] text-sm font-medium leading-normal" href="#">หน้าหลัก</a>
              <a class="text-[#1d110c] text-sm font-medium leading-normal" href="#">เมนู</a>
              <!-- <a class="text-[#1d110c] text-sm font-medium leading-normal" href="#">ร้านอาหาร</a> -->
              <!-- a class="text-[#1d110c] text-sm font-medium leading-normal" href="#">ข้อเสนอ</a -->
            </div>
            <button
              class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-[#f4eae6] text-[#1d110c] text-sm font-bold leading-normal tracking-[0.015em]"
            >
              <span class="truncate">สร้างบัญชี</span>
            </button>
          </div>
        </header>
        <div class="px-40 flex flex-1 justify-center py-5">
          <div class="layout-content-container flex flex-col w-[512px] max-w-[512px] py-5 max-w-[960px] flex-1">
            <div class="@container">
              <div class="@[480px]:px-4 @[480px]:py-3">
                <div
                  class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-[#fcf9f8] @[512px]:rounded-xl min-h-80"
                  style='background-image: url("meow.png");'
                ></div>
              </div>
            </div>
            <h2 class="text-[#1d110c] tracking-light text-[28px] font-bold leading-tight px-4 text-left pb-3 pt-5">ยินดีต้อนรับ</h2>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <input
                  placeholder="Email  หรือ username"
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#1d110c] focus:outline-0 focus:ring-0 border-none bg-[#f4eae6] focus:border-none h-14 placeholder:text-[#a15d45] p-4 text-base font-normal leading-normal"
                  value=""
                />
              </label>
            </div>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <input
                  placeholder="รหัสผ่าน"
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#1d110c] focus:outline-0 focus:ring-0 border-none bg-[#f4eae6] focus:border-none h-14 placeholder:text-[#a15d45] p-4 text-base font-normal leading-normal"
                  value=""
                />
              </label>
            </div>
            <p class="text-[#a15d45] text-sm font-normal leading-normal pb-3 pt-1 px-4 underline">ลืมรหัสผ่าน?</p>
            <div class="flex px-4 py-3">
              <button
                class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 flex-1 bg-[#ff6933] text-[#fcf9f8] text-base font-bold leading-normal tracking-[0.015em]"
              >
                <span class="truncate">ล็อกอิน</span>
              </button>
            </div>
            <p class="text-[#a15d45] text-sm font-normal leading-normal pb-3 pt-1 px-4 text-center">ยังไม่มีบัญชี?    สร้างบัญชีเลย!</p>
            <!--div class="flex justify-center">
              <div class="flex flex-1 gap-3 flex-wrap px-4 py-3 max-w-[480px] justify-center">
                <button
                  class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-[#f4eae6] text-[#1d110c] text-sm font-bold leading-normal tracking-[0.015em] grow"
                >
                  <span class="truncate">ยังไม่มีบัญชี?    สร้างบัญชีเลย!</span>
                </button>
                <button
                  class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-[#f4eae6] text-[#1d110c] text-sm font-bold leading-normal tracking-[0.015em] grow"
                >
                  <span class="truncate">Continue with SocialMedia</span>
                </button>
              </div>
            </div>
            <p class="text-[#a15d45] text-sm font-normal leading-normal pb-3 pt-1 px-4 text-center underline">Don't have an account? Sign Up</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
