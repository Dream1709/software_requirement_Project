<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มเมนูใหม่ - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fcfbf9; }
        
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#fd6e3b',
                            darkOrange: '#e55a2b',
                            inputBg: '#f8ece7',
                            textMuted: '#b1745f',
                            bgWhite: '#fcfbf9'
                        }
                    }
                }
            }
        }
    </script>
    
</head>
<body class="min-h-screen flex" style="background-color: #f5f5f0; font-family: 'Kanit', sans-serif;">

    <!-- Sidebar -->
    <aside class="w-56 bg-white border-r border-gray-100 flex flex-col py-6 px-3 fixed h-full z-10">
        <div class="px-3 mb-8">
            <div class="flex items-center gap-2">
                <span class="text-orange-500 text-lg">✦</span>
                <span class="font-bold text-gray-800 text-sm">ร้านเพิ่มข้าว</span>
            </div>
        </div>
        <nav class="space-y-1 flex-1">
            <a href="/admin/main.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 text-sm hover:bg-gray-50 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                หน้าหลัก
            </a>
            <a href="/admin/manage_menu.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-800 font-medium text-sm" style="background-color: #f0ede8;">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                สินค้า
            </a>
            <a href="/admin/report.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 text-sm hover:bg-gray-50 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                รายงาน
            </a>
        </nav>
        <div class="px-3">
            <button onclick="window.location.href='/admin/login.html'" class="w-full py-2 bg-gray-100 text-gray-500 rounded-xl text-xs hover:bg-gray-200 transition">
                ออกจากระบบ
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 ml-56 bg-white min-h-screen">
        <div class="p-8 md:p-12 max-w-3xl">
            <form id="add-product-form" class="space-y-6" onsubmit="saveProduct(event)">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">เพิ่มเมนูใหม่</h2> 
                </div>
                <div>
                    <div>
                        <label class="block text-sm font-medium text-gray-500 mb-2 ml-1">รูปภาพอาหาร</label>
                        <div id="image-container" onclick="document.getElementById('p-img-file').click()" 
                        class="w-1/2 h-64 bg-[#f8ece7] rounded-[2.5rem] border-2 border-dashed border-[#b1745f]/20 flex items-center justify-center overflow-hidden relative group transition hover:border-orange-500/50 cursor-pointer">
        
                        <img id="img-preview" src="" class="hidden w-full h-full object-cover">
        
                        <div id="placeholder-text" class="text-center">
                            <div class="text-4xl text-[#b1745f] mb-2">+</div>
                            <p class="text-[#b1745f]/60 text-sm px-4">คลิกเพื่อเลือกไฟล์รูปภาพจากเครื่อง</p>
                            </div>
                        </div>
    
                        <input type="file" id="p-img-file" accept="image/*" class="hidden">
                        <input type="hidden" id="p-img-data">
                     </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-500 mb-2 ml-1">ชื่ออาหาร</label>
                    <input type="text" id="p-name" placeholder="ระบุชื่อเมนู..." required
                        class="w-1/2 bg-[#f8ece7] text-gray-800 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-orange-500/30 transition appearance-none">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-500 mb-2 ml-1">หมวดหมู่</label>
                        <select id="p-category" class="w-full bg-[#f8ece7] text-gray-800 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-orange-500/30 transition appearance-none">
                            <option value="เมนูต้มแกง">เมนูต้มแกง</option>
                            <option value="เมนูตามสั่ง">เมนูตามสั่ง</option>
                            <option value="เมนูข้าวผัด">เมนูข้าวผัด</option>
                            <option value="เมนูทอด">เมนูทอด</option>
                            <option value="เมนูน้ำพริกกระปิ">เมนูน้ำพริกกระปิ</option>
                            <option value="เมนูเส้น">เมนูเส้น</option>
                            <option value="เมนูยำ">เมนูยำ</option>
                            <option value="เมนูเพิ่มเติม">เมนูเพิ่มเติม</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-500 mb-2 ml-1">ราคาเริ่มต้น (บาท)</label>
                        <input type="number" id="p-price" placeholder="เช่น 40" min="0"
                            class="w-full bg-[#f8ece7] text-gray-800 placeholder-[#b1745f]/60 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-orange-500/30 transition">
                        <p class="text-xs text-gray-400 mt-1.5 ml-1">ราคาสำหรับแสดงบนหน้าเมนู</p>
                    </div>
                </div>

                

                <div class="pt-6 flex justify-between">
                    <button type="button" onclick="window.location.href='/admin/manage_menu.html';" 
                        class=" bg-[#cccccc] hover:bg-[#bbbbbb] text-gray-800 font-bold rounded-2xl px-6 py-5 transition shadow-lg transform active:scale-[0.98]">
                        ยกเลิก
                    </button>
    
                    <button type="submit" 
                        class=" bg-[#E54D66]/80 hover:bg-[#E54D66] text-white font-bold rounded-2xl px-6 py-5 transition shadow-lg transform active:scale-[0.98]">
                        บันทึกรายการเมนู
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script>
        const fileInput = document.getElementById('p-img-file');
const imgPreview = document.getElementById('img-preview');
const placeholder = document.getElementById('placeholder-text');
const imgDataInput = document.getElementById('p-img-data');

fileInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            
            img.onload = function() {
                // สร้าง Canvas เพื่อใช้บีบอัดรูป
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // ตั้งค่าขนาดที่ต้องการ (เช่น กว้างไม่เกิน 800px)
                const maxWidth = 800;
                const scale = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scale;

                // วาดรูปลง Canvas
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                // แปลงเป็น Base64 โดยลดคุณภาพเหลือ 0.7 (70%)
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                
                // แสดงผลและเก็บข้อมูล
                imgPreview.src = compressedBase64;
                imgPreview.classList.remove('hidden');
                placeholder.classList.add('hidden');
                imgDataInput.value = compressedBase64;
            }
        }
        reader.readAsDataURL(file);
    }
});

function saveProduct(event) {
    event.preventDefault();
    
    const newProduct = {
        id: Date.now(),
        name: document.getElementById('p-name').value.trim(),
        category: document.getElementById('p-category').value,
        price: parseInt(document.getElementById('p-price').value) || 0,
        img: document.getElementById('p-img-data').value 
    };

    // เช็คว่าเลือกรูปหรือยัง
    if (!newProduct.img) {
        alert("กรุณาเลือกรูปภาพก่อนบันทึก!");
        return;
    }

    // บันทึกลง localStorage
    try {
        let adminMenu = JSON.parse(localStorage.getItem('foodMenu')) || [];
        adminMenu.push(newProduct);
        localStorage.setItem('foodMenu', JSON.stringify(adminMenu));
        
        alert('เพิ่มเมนู "' + newProduct.name + '" เรียบร้อยแล้ว!');
        window.location.href = '/admin/manage_menu.html';
    } catch (e) {
        alert("ไม่สามารถบันทึกได้ พื้นที่จัดเก็บอาจเต็ม (ลองใช้รูปที่เล็กลงนะครับ)");
        console.error(e);
    }
}
    </script>
</body>
</html>
