<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ล็อกอินแอดมิน - ร้านเพิ่มข้าว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #faf7f4; font-family: 'Kanit', sans-serif; }
        .input-field {
            width: 100%; background: #f5ede8; border: none; border-radius: 14px;
            padding: 14px 20px; font-family: 'Kanit', sans-serif; font-size: 15px;
            color: #333; outline: none; transition: box-shadow 0.2s;
        }
        .input-field::placeholder { color: #c08070; opacity: 0.8; }
        .input-field:focus { box-shadow: 0 0 0 2.5px rgba(253,110,59,0.35); }
        .btn-orange {
            width: 100%; background: #fd6e3b; color: white; border: none;
            border-radius: 14px; padding: 15px; font-family: 'Kanit', sans-serif;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s;
        }
        .btn-orange:hover { background: #e55a2b; }
        .btn-orange:active { transform: scale(0.98); }
        label { font-size: 13px; color: #888; font-weight: 400; margin-bottom: 6px; display: block; }
        .modal-overlay {
            position: fixed; inset: 0; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
        }
        .modal-box {
            background: white; border-radius: 28px; padding: 40px 36px;
            max-width: 380px; width: 90%; display: flex; flex-direction: column;
            align-items: center; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .modal-icon {
            width: 60px; height: 60px; background: #fff4f0; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
        }

        /* shake animation on error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav style="background:white; border-bottom:1px solid #f0ebe6;" class="flex items-center justify-between px-8 py-4 sticky top-0 z-20">
        <div class="flex items-center gap-2 font-bold text-gray-800 text-base">
            <span style="color:#fd6e3b; font-size:18px;">✦</span>
            ร้านเพิ่มข้าว
        </div>
        <a href="Create_account.html" style="color:#fd6e3b; font-size:14px; font-weight:500;" class="hover:underline">
            สร้างบัญชีแอดมิน
        </a>
    </nav>

    <main class="flex-1 flex flex-col items-center px-6 py-10">

        <div style="width:100%; max-width:560px; height:260px; border-radius:20px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08); margin-bottom:36px;">
            <img src="https://images.unsplash.com/photo-1559314809-0d155014e29e?q=80&w=2000&auto=format&fit=crop"
                 alt="ร้านเพิ่มข้าว" style="width:100%; height:100%; object-fit:cover;">
        </div>

        <div class="text-center mb-8">
            <h1 style="font-size:22px; font-weight:700; color:#222; margin-bottom:6px;">ยินดีต้อนรับ</h1>
            <p style="font-size:14px; color:#c08070;">เข้าสู่ระบบสำหรับเจ้าของร้าน / แอดมิน</p>
        </div>

        <div style="width:100%; max-width:420px;">
            <form id="login-form" onsubmit="event.preventDefault(); doLogin();">
                <div style="margin-bottom:16px;">
                    <label>ชื่อผู้ใช้</label>
                    <input type="text" id="username" class="input-field" placeholder="ระบุชื่อผู้ใช้...">
                </div>
                <div style="margin-bottom:28px;">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="password" class="input-field" placeholder="ระบุรหัสผ่าน...">
                </div>
                <button type="submit" class="btn-orange">เข้าสู่ระบบ</button>
            </form>

            <div class="text-center mt-6">
                <span style="color:#aaa; font-size:13px;">ยังไม่มีบัญชี? </span>
                <a href="Create_account.html" style="color:#fd6e3b; font-size:13px; font-weight:500;" class="hover:underline">สร้างบัญชีแอดมิน</a>
            </div>

            <!-- แสดงจำนวนบัญชีที่มีอยู่ (เพื่อ debug / ทดสอบ) -->
            <div id="account-info" style="margin-top:24px; padding:14px 18px; background:#f5ede8; border-radius:12px; display:none;">
                <p style="font-size:13px; color:#b1745f; font-weight:500;">📋 บัญชีแอดมินที่มีอยู่:</p>
                <ul id="account-list" style="margin-top:6px; font-size:13px; color:#888; list-style:none; padding:0;"></ul>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-icon">
                <svg width="28" height="28" fill="none" stroke="#fd6e3b" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h3 id="modal-title" style="font-size:20px; font-weight:700; color:#222; margin-bottom:8px; text-align:center;"></h3>
            <p id="modal-desc" style="font-size:14px; color:#999; text-align:center;"></p>
        </div>
    </div>

    <script>
        // แสดงรายชื่อบัญชีที่มีอยู่
        function renderAccountInfo() {
            const accounts = JSON.parse(localStorage.getItem('adminAccounts') || '[]');
            const infoBox = document.getElementById('account-info');
            const list = document.getElementById('account-list');
            if (accounts.length > 0) {
                infoBox.style.display = 'block';
                list.innerHTML = accounts.map((a, i) =>
                    `<li>• ${a.username}</li>`
                ).join('');
            } else {
                infoBox.style.display = 'none';
            }
        }
        renderAccountInfo();

        function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showModal('ข้อมูลไม่ครบถ้วน', 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน');
                shakeForm();
                return;
            }

            const accounts = JSON.parse(localStorage.getItem('adminAccounts') || '[]');

            if (accounts.length === 0) {
                showModal('ยังไม่มีบัญชี', 'กรุณาสร้างบัญชีแอดมินก่อนเข้าสู่ระบบ');
                return;
            }

            const match = accounts.find(a =>
                a.username.toLowerCase() === username.toLowerCase() && a.password === password
            );

            if (!match) {
                showModal('ชื่อหรือรหัสผ่านไม่ถูกต้อง', 'กรุณาตรวจสอบและลองใหม่อีกครั้ง');
                shakeForm();
                return;
            }

            // ล็อกอินสำเร็จ — บันทึก session แล้วไปหน้า main
            sessionStorage.setItem('loggedInAdmin', match.username);
            alert(`เข้าสู่ระบบสำเร็จ! ยินดีต้อนรับ คุณ${match.username}`);
            window.location.href = '/admin/main.html';
        }

        function shakeForm() {
            const form = document.getElementById('login-form');
            form.classList.remove('shake');
            void form.offsetWidth; // reflow
            form.classList.add('shake');
        }

        function showModal(title, desc) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-desc').textContent = desc;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal(e) {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
