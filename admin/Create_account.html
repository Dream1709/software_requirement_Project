<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างบัญชี - ร้านเพิ่มข้าว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #faf7f4; font-family: 'Kanit', sans-serif; }
        .input-field {
            width: 100%; background: #f5ede8; border: none; border-radius: 14px;
            padding: 14px 20px; font-family: 'Kanit', sans-serif; font-size: 15px;
            color: #333; outline: none; transition: box-shadow 0.2s;
        }
        .input-field::placeholder { color: #c08070; opacity: 0.8; }
        .input-field:focus { box-shadow: 0 0 0 2.5px rgba(253,110,59,0.35); }
        .btn-orange {
            width: 100%; background: #fd6e3b; color: white; border: none;
            border-radius: 14px; padding: 15px; font-family: 'Kanit', sans-serif;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s;
        }
        .btn-orange:hover { background: #e55a2b; }
        .btn-orange:active { transform: scale(0.98); }
        .btn-outline {
            background: transparent; border: 1.5px solid #fd6e3b; color: #fd6e3b;
            border-radius: 10px; padding: 8px 20px; font-family: 'Kanit', sans-serif;
            font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;
        }
        .btn-outline:hover { background: #fd6e3b; color: white; }
        label { font-size: 13px; color: #888; font-weight: 400; margin-bottom: 6px; display: block; }
        .strength-bar { height: 4px; border-radius: 4px; transition: all 0.3s; }
        .modal-overlay {
            position: fixed; inset: 0; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
        }
        .modal-box {
            background: white; border-radius: 28px; padding: 40px 36px;
            max-width: 380px; width: 90%; display: flex; flex-direction: column;
            align-items: center; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .modal-icon {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
        }
        .modal-icon.error { background: #fff4f0; }
        .modal-icon.success { background: #f0fff4; }
        .modal-btn {
            margin-top: 20px; padding: 10px 32px; border-radius: 12px;
            font-family: 'Kanit', sans-serif; font-size: 15px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.2s;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav style="background:white; border-bottom:1px solid #f0ebe6;" class="flex items-center justify-between px-8 py-4 sticky top-0 z-20">
        <div class="flex items-center gap-2 font-bold text-gray-800 text-base">
            <span style="color:#fd6e3b; font-size:18px;">✦</span>
            สร้างบัญชีแอดมิน
        </div>
        <a href="login.html"><button class="btn-outline">เข้าสู่ระบบ</button></a>
    </nav>

    <main class="flex-1 flex flex-col items-center px-6 py-10">
        <div style="width:100%; max-width:560px; height:260px; border-radius:20px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08); margin-bottom:36px;">
            <img src="https://images.unsplash.com/photo-1559314809-0d155014e29e?q=80&w=2000&auto=format&fit=crop"
                 alt="ร้านเพิ่มข้าว" style="width:100%; height:100%; object-fit:cover;">
        </div>

        <div class="text-center mb-8">
            <h1 style="font-size:22px; font-weight:700; color:#222; margin-bottom:6px;">สร้างบัญชีแอดมิน</h1>
            <p style="font-size:14px; color:#c08070;">กรอกข้อมูลเพื่อสร้างบัญชีสำหรับเจ้าของร้าน</p>
        </div>

        <div style="width:100%; max-width:420px;">
            <form id="register-form" onsubmit="event.preventDefault(); doRegister();">
                <div style="margin-bottom:16px;">
                    <label>ชื่อผู้ใช้</label>
                    <input type="text" id="name" class="input-field" placeholder="ระบุชื่อผู้ใช้...">
                </div>
                <div style="margin-bottom:16px;">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="password" class="input-field" placeholder="ตั้งรหัสผ่าน (อย่างน้อย 8 ตัวอักษร)" oninput="checkStrength(this.value)">
                </div>
                <div style="margin-bottom:8px;">
                    <label>ยืนยันรหัสผ่าน</label>
                    <input type="password" id="password2" class="input-field" placeholder="กรอกรหัสผ่านอีกครั้ง">
                </div>

                <div style="margin-bottom:24px;">
                    <div style="display:flex; gap:4px; margin-bottom:4px; margin-top:10px;">
                        <div id="bar1" class="strength-bar" style="flex:1; background:#e8ddd8;"></div>
                        <div id="bar2" class="strength-bar" style="flex:1; background:#e8ddd8;"></div>
                        <div id="bar3" class="strength-bar" style="flex:1; background:#e8ddd8;"></div>
                    </div>
                    <p id="strength-text" style="font-size:12px; color:#aaa;"></p>
                </div>

                <button type="submit" class="btn-orange">สร้างบัญชี</button>
            </form>

            <div class="text-center mt-6">
                <span style="color:#aaa; font-size:13px;">มีบัญชีอยู่แล้ว? </span>
                <a href="login.html" style="color:#fd6e3b; font-size:13px; font-weight:500;" class="hover:underline">เข้าสู่ระบบ</a>
            </div>
        </div>
    </main>

    <div id="modal" class="modal-overlay" style="display:none;" onclick="handleOverlayClick(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div id="modal-icon" class="modal-icon error">
                <svg id="modal-svg" width="28" height="28" fill="none" stroke="#fd6e3b" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h3 id="modal-title" style="font-size:20px; font-weight:700; color:#222; margin-bottom:8px; text-align:center;"></h3>
            <p id="modal-desc" style="font-size:14px; color:#999; text-align:center;"></p>
            <button id="modal-btn" class="modal-btn" onclick="handleModalBtn()" style="display:none;"></button>
        </div>
    </div>

    <script>
        let isSuccess = false;

        function checkStrength(val) {
            ['bar1','bar2','bar3'].forEach(b => document.getElementById(b).style.background = '#e8ddd8');
            const txt = document.getElementById('strength-text');
            if (!val) { txt.textContent = ''; return; }
            let score = 0;
            if (val.length >= 8) score++;
            if (/[0-9]/.test(val) || /[!@#$%^&*]/.test(val)) score++;
            if (val.length >= 12) score++;
            const colors = ['#fd6e3b','#f5a623','#34c759'];
            const labels = ['รหัสผ่านอ่อนแอ','รหัสผ่านพอใช้','รหัสผ่านแข็งแกร่ง'];
            for (let i = 0; i < score; i++) {
                document.getElementById(['bar1','bar2','bar3'][i]).style.background = colors[score-1];
            }
            txt.style.color = colors[score-1];
            txt.textContent = score > 0 ? labels[score-1] : '';
        }

        function doRegister() {
            const name = document.getElementById('name').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;

            if (!name || !password || !password2) {
                showModal('error', 'ข้อมูลไม่ครบถ้วน', 'กรุณากรอกข้อมูลให้ครบทุกช่อง'); return;
            }
            if (password.length < 8) {
                showModal('error', 'รหัสผ่านสั้นเกินไป', 'กรุณาตั้งรหัสผ่านอย่างน้อย 8 ตัวอักษร'); return;
            }
            if (password !== password2) {
                showModal('error', 'รหัสผ่านไม่ตรงกัน', 'กรุณากรอกรหัสผ่านให้ตรงกันทั้งสองช่อง'); return;
            }

            // ดึงบัญชีที่มีอยู่จาก localStorage
            const accounts = JSON.parse(localStorage.getItem('adminAccounts') || '[]');

            // เช็คชื่อซ้ำ
            if (accounts.some(a => a.username.toLowerCase() === name.toLowerCase())) {
                showModal('error', 'ชื่อนี้ถูกใช้แล้ว', 'กรุณาเลือกชื่อผู้ใช้อื่น'); return;
            }

            // บันทึกบัญชีใหม่
            accounts.push({ username: name, password: password });
            localStorage.setItem('adminAccounts', JSON.stringify(accounts));

            isSuccess = true;
            showModal('success', 'สร้างบัญชีสำเร็จ!', `ยินดีต้อนรับ คุณ${name}`, 'เข้าสู่ระบบเลย', '#34c759');
        }

        function showModal(type, title, desc, btnText = null, btnColor = null) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-desc').textContent = desc;
            const icon = document.getElementById('modal-icon');
            const svg = document.getElementById('modal-svg');
            const btn = document.getElementById('modal-btn');

            if (type === 'success') {
                icon.className = 'modal-icon success';
                svg.setAttribute('stroke','#34c759');
                svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>';
            } else {
                icon.className = 'modal-icon error';
                svg.setAttribute('stroke','#fd6e3b');
                svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>';
            }

            if (btnText) {
                btn.style.display = 'block';
                btn.textContent = btnText;
                btn.style.background = btnColor || '#fd6e3b';
                btn.style.color = 'white';
            } else {
                btn.style.display = 'none';
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function handleModalBtn() {
            if (isSuccess) window.location.href = 'login.html';
            else document.getElementById('modal').style.display = 'none';
        }

        function handleOverlayClick(e) {
            if (!isSuccess) document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
