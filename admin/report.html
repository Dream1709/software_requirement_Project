<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานยอดขาย - ร้านเพิ่มข้าว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f5f5f0; }
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background-color: #f0ede8; }
        .sidebar-item.active { background-color: #f0ede8; }
        .progress-bar { transition: width 0.8s ease; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .stat-card { transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-56 bg-white border-r border-gray-100 flex flex-col py-6 px-3 fixed h-full z-10">
        <div class="px-3 mb-8">
            <div class="flex items-center gap-2">
                <span class="text-orange-500 text-lg">✦</span>
                <span class="font-bold text-gray-800 text-sm">ร้านเพิ่มข้าว</span>
            </div>
        </div>
        <nav class="space-y-1 flex-1">
            <a href="/admin/main.html" class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                หน้าหลัก
            </a>
            <a href="/admin/manage_menu.html" class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                สินค้า
            </a>
            <a href="#" class="sidebar-item active flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-800 font-medium text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                รายงาน
            </a>
        </nav>
        <div class="px-3">
            <button onclick="window.location.href='/admin/login.html'" class="w-full py-2 bg-gray-100 text-gray-500 rounded-xl text-xs hover:bg-gray-200 transition">
                ออกจากระบบ
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-56 p-8">

        <div class="max-w-6xl mx-auto">

            <!-- Header -->
            <div class="flex items-center gap-2 mb-8">
                <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                <h1 class="text-lg font-bold text-gray-800">รายงานยอดขายประจำวัน</h1>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

                <!-- Left Column -->
                <div class="lg:col-span-2 space-y-5">

                    <!-- Date Navigation -->
                    <div class="flex items-center gap-3">
                        <button onclick="changeDay(-1)" title="วันก่อนหน้า"
                            class="w-9 h-9 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-orange-50 hover:border-orange-300 transition text-gray-500 text-lg font-bold shadow-sm">‹</button>
                        <span id="date-badge" class="inline-block bg-white border border-gray-200 text-gray-600 text-sm font-medium px-5 py-2 rounded-full shadow-sm min-w-[160px] text-center"></span>
                        <button onclick="changeDay(1)" id="btn-next" title="วันถัดไป"
                            class="w-9 h-9 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-orange-50 hover:border-orange-300 transition text-gray-500 text-lg font-bold shadow-sm disabled:opacity-30 disabled:cursor-not-allowed">›</button>
                    </div>

                    <!-- Stat Cards -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="stat-card bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
                            <p class="text-xs text-gray-400 mb-1">ยอดขายรวม</p>
                            <p id="stat-total" class="text-3xl font-bold text-gray-900">0 บาท</p>
                        </div>
                        <div class="stat-card bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
                            <p class="text-xs text-gray-400 mb-1">จำนวนออเดอร์</p>
                            <p id="stat-count" class="text-3xl font-bold text-gray-900">0 ออเดอร์</p>
                        </div>
                    </div>

                    <!-- Recent Sales Table -->
                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-50">
                            <h2 class="font-bold text-gray-800 text-sm">รายการขายล่าสุด</h2>
                        </div>
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="border-b border-gray-50">
                                    <th class="px-6 py-3 text-left text-xs text-gray-400 font-medium">เวลา</th>
                                    <th class="px-6 py-3 text-left text-xs text-gray-400 font-medium">รายการอาหาร</th>
                                    <th class="px-6 py-3 text-right text-xs text-gray-400 font-medium">ยอดรวม</th>
                                </tr>
                            </thead>
                            <tbody id="sales-tbody" class="divide-y divide-gray-50"></tbody>
                        </table>
                        <div id="empty-state" class="hidden py-12 text-center text-gray-400">
                            <div class="text-4xl mb-3">📋</div>
                            <p class="text-sm">ยังไม่มีรายการขาย</p>
                            <p class="text-xs mt-1 text-gray-300">ออเดอร์ที่ลูกค้าส่งมาจะแสดงที่นี่</p>
                        </div>
                    </div>

                </div>

                <!-- Right Column — Popular Items -->
                <div class="space-y-4">
                    <h2 class="font-bold text-gray-800 text-sm px-1">เมนูยอดนิยม</h2>
                    <div id="popular-container" class="space-y-4">
                        <div class="text-center text-gray-300 text-sm py-8">ยังไม่มีข้อมูล</div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const thaiMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
        let dayOffset = 0; // 0 = วันนี้, -1 = เมื่อวาน, ...

        function toDateKey(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function formatThaiDate(d) {
            return `${d.getDate()} ${thaiMonths[d.getMonth()]} ${d.getFullYear()+543}`;
        }

        function changeDay(delta) {
            const newOffset = dayOffset + delta;
            if (newOffset > 0 || newOffset < -99) return;
            dayOffset = newOffset;
            loadReport();
        }

        function loadReport() {
            const targetDate = new Date();
            targetDate.setDate(targetDate.getDate() + dayOffset);
            const dateKey = toDateKey(targetDate);

            document.getElementById('date-badge').textContent = formatThaiDate(targetDate);
            const btnNext = document.getElementById('btn-next');
            if (btnNext) btnNext.disabled = (dayOffset === 0);

            const todayKey = toDateKey(new Date());
            const allOrders = JSON.parse(localStorage.getItem('orders')) || [];
            const orders = allOrders.filter(o => {
                const orderKey = o.dateKey || todayKey; // orders เก่าที่ไม่มี dateKey ถือว่าวันนี้
                return orderKey === dateKey;
            });

            // คำนวณยอดรวม
            const totalRevenue = orders.reduce((sum, o) => sum + o.total, 0);
            document.getElementById('stat-total').textContent = totalRevenue.toLocaleString() + ' บาท';
            document.getElementById('stat-count').textContent = orders.length + ' ออเดอร์';

            // ตารางรายการล่าสุด
            const tbody = document.getElementById('sales-tbody');
            const emptyState = document.getElementById('empty-state');
            tbody.innerHTML = '';

            if (orders.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                orders.slice(0, 10).forEach((order, i) => {
                    const itemSummary = order.items.map(item => `${item.name} (${item.quantity})`).join(', ');
                    const tr = document.createElement('tr');
                    tr.className = 'fade-in hover:bg-gray-50 transition';
                    tr.style.animationDelay = `${i * 0.05}s`;
                    tr.innerHTML = `
                        <td class="px-6 py-3.5 text-gray-400 text-xs whitespace-nowrap">${order.time}</td>
                        <td class="px-6 py-3.5 text-gray-700 max-w-xs">
                            <p class="truncate">${itemSummary}</p>
                            <p class="text-xs text-gray-400">${order.customerName} · โต๊ะ ${order.table}</p>
                        </td>
                        <td class="px-6 py-3.5 text-right font-medium text-gray-800">${order.total} บาท</td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            // เมนูยอดนิยม
            const itemCount = {};
            orders.forEach(order => {
                order.items.forEach(item => {
                    // ตัดชื่อเมนูหลักออกมา (ก่อน " + ")
                    const menuName = item.name.split(' + ')[0].trim();
                    itemCount[menuName] = (itemCount[menuName] || 0) + item.quantity;
                });
            });

            const sorted = Object.entries(itemCount).sort((a, b) => b[1] - a[1]).slice(0, 4);
            const totalAllItems = Object.values(itemCount).reduce((s, v) => s + v, 0) || 1;
            const container = document.getElementById('popular-container');
            container.innerHTML = '';

            if (sorted.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-300 text-sm py-8">ยังไม่มีข้อมูล</div>';
                return;
            }

            // หารูปจาก localStorage หรือ default menu
            const allMenu = getAllMenu();

            sorted.forEach(([name, count], i) => {
                const percent = Math.round((count / totalAllItems) * 100);
                const menuItem = allMenu.find(m => m.name === name);
                const imgSrc = menuItem?.img || '';

                const div = document.createElement('div');
                div.className = 'fade-in bg-white rounded-2xl p-4 border border-gray-100 shadow-sm';
                div.style.animationDelay = `${i * 0.1}s`;
                div.innerHTML = `
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-12 h-12 rounded-xl overflow-hidden bg-gray-100 flex-shrink-0">
                            ${imgSrc ? `<img src="${imgSrc}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-xl">🍽️</div>`}
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-semibold text-gray-800 text-sm truncate">${name}</p>
                            <p class="text-xs text-gray-400">${count} จาน</p>
                        </div>
                        <span class="text-sm font-bold text-gray-500">${percent}%</span>
                    </div>
                    <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div class="progress-bar h-full bg-orange-400 rounded-full" style="width: 0%" data-width="${percent}%"></div>
                    </div>
                `;
                container.appendChild(div);
            });

            // animate progress bars
            setTimeout(() => {
                document.querySelectorAll('.progress-bar').forEach(bar => {
                    bar.style.width = bar.dataset.width;
                });
            }, 100);
        }

        function getAllMenu() {
            const systemMenu = [
                {name:"แกงเขียวหวาน",img:"/รูปอาหาร/Kaeng Khiaowan.png"},
                {name:"ต้มยำ",img:"/รูปอาหาร/Tomyam.png"},
                {name:"แกงส้ม",img:"/รูปอาหาร/Kaengsom.png"},
                {name:"ต้มข่า",img:"/รูปอาหาร/Tomkha.png"},
                {name:"ต้มจืด",img:"/รูปอาหาร/tom-jed-moo.png"},
                {name:"ผัดกะเพรา",img:"/รูปอาหาร/krapao-moo.png"},
                {name:"ผัดคะน้า",img:"/รูปอาหาร/Phat Khana.png"},
                {name:"ราดพริก",img:"/รูปอาหาร/Kai Rat Phrik.png"},
                {name:"ผัดพริกเผา",img:"/รูปอาหาร/Kai Phrik Phao.png"},
                {name:"พะแนง",img:"/รูปอาหาร/Pha Nong Kai.png"},
                {name:"พริกแกง",img:"/รูปอาหาร/Phrik Kaeng Kai.png"},
                {name:"ผัดเผ็ด",img:"/รูปอาหาร/Phat Phet Kai.png"},
                {name:"ผัดฉ่า",img:"/รูปอาหาร/Phat Cha Kai.png"},
                {name:"ผัดผงกะหรี่",img:"/รูปอาหาร/Kai Phat Phong Kra Ri.png"},
                {name:"ทอดกะเทียม",img:"/รูปอาหาร/Kai Thot Krathiam.png"},
                {name:"ผัดผักรวม",img:"/รูปอาหาร/Phat Kruam.png"},
                {name:"ผัดพริกสด",img:"/รูปอาหาร/Phat Phrik Sot.png"},
                {name:"ไข่ยัดไส้",img:"/รูปอาหาร/Khai Yat Sai.png"},
                {name:"ข้าวผัดไข่",img:"/รูปอาหาร/Khaophat Khai.png"},
                {name:"ข้าวผัดแหนม",img:"/รูปอาหาร/Khaophat Naem.png"},
                {name:"ข้าวผัดสัปรดแฮม",img:"/รูปอาหาร/Khaophat Prot Haem.png"},
                {name:"ข้าวผัดไส้กรอก",img:"/รูปอาหาร/Khaophat Saikrok.png"},
                {name:"ปีกไก่ทอด",img:"/รูปอาหาร/Pik Kai Thot.png"},
                {name:"หมูทอด",img:"/รูปอาหาร/Mu Thot.png"},
                {name:"กุนเชียงทอด",img:"/รูปอาหาร/Kunchiang Thot.png"},
                {name:"หมูยอทอด",img:"/รูปอาหาร/MuYo Thot.png"},
                {name:"เนื้อทอด",img:"/รูปอาหาร/Nuea Thot.png"},
                {name:"กุ้งทอด",img:"/รูปอาหาร/Kung Thot.png"},
                {name:"ดอลลี่ทอด",img:"/รูปอาหาร/Donli Thot.png"},
                {name:"น้ำพริกกระปิ + ชะอมทอด",img:"/รูปอาหาร/Namphrik Kra Pi ChaOm Thot.png"},
                {name:"น้ำพริกกระปิ + ปลาทูทอด",img:"/รูปอาหาร/Namphrik Kra Pi   Phak Thot.png"},
                {name:"น้ำพริกกระปิ + ปลานิลทอด",img:"/รูปอาหาร/Namphrik Kra Pi   Pla Nin Thot.png"},
                {name:"น้ำพริกกระปิ + ผักทอด",img:"/รูปอาหาร/Namphrik Kra Pi   Phak Thot.png"},
                {name:"น้ำพริกกระปิ + มะเขือยาวทอด",img:"/รูปอาหาร/Namphrik Kra Pi   MakhueaYao Thot.png"},
                {name:"ผัดมาม่า",img:"/รูปอาหาร/Phat Ma Ma.png"},
                {name:"สุกี้",img:"/รูปอาหาร/Suk Ki.png"},
                {name:"ราดหน้า",img:"/รูปอาหาร/Rat Na.png"},
                {name:"ผัดไทย",img:"/รูปอาหาร/PhatThai.png"},
                {name:"ผัดซีอิ้ว",img:"/รูปอาหาร/Phat Si Io.png"},
                {name:"สปาเก็ตตี้",img:"/รูปอาหาร/Sapa Ket Ti.png"},
                {name:"ยำวุ้นเส้นหมูสับ",img:"/รูปอาหาร/Yam Wunsen Mu.png"},
                {name:"ยำปลากระป๋อง",img:"/รูปอาหาร/Yam Pla Krapong.png"},
                {name:"ยำหมูยอ",img:"/รูปอาหาร/Yam MuYo.png"},
                {name:"ยำรวมมิตร",img:"/รูปอาหาร/Yam Ruammit.png"},
                {name:"ยำปลากรอบ",img:"/รูปอาหาร/Yam Pla Krob.png"},
                {name:"ยำกุนเชียง",img:"/รูปอาหาร/Yam Kunchiang.png"},
                {name:"ยำไข่ดาว",img:"/รูปอาหาร/Yam Khai Dao.png"},
                {name:"ข้าวคลุกกะปิ",img:"/รูปอาหาร/Khao Khluk Ka Pi.png"},
            ];
            return [...systemMenu, ...(JSON.parse(localStorage.getItem('foodMenu')) || [])];
        }

        loadReport();
        // refresh ทุก 15 วินาที
        setInterval(loadReport, 15000);
    </script>

</body>
</html>
