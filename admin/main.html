<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ร้านเพิ่มข้าว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #ede9e2;
            background-image:
                radial-gradient(ellipse 80% 60% at 10% 0%, rgba(253,110,59,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 100%, rgba(253,110,59,0.06) 0%, transparent 55%),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 39px,
                    rgba(180,160,140,0.07) 39px,
                    rgba(180,160,140,0.07) 40px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 39px,
                    rgba(180,160,140,0.07) 39px,
                    rgba(180,160,140,0.07) 40px
                );
        }
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background-color: #f0ede8; }
        .sidebar-item.active { background-color: #fff0ea; color: #fd6e3b; }
        .stat-card {
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 0px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,0.10); }
        .fade-in { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        aside {
            box-shadow: 4px 0 20px rgba(0,0,0,0.06);
        }
        .table-card {
            box-shadow: 0 2px 0px rgba(0,0,0,0.06), 0 4px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-60 bg-white border-r border-gray-100 flex flex-col py-7 px-4 fixed h-full z-10">
        <div class="px-3 mb-9">
            <div class="flex items-center gap-2.5">
                <span class="text-orange-500 text-xl">✦</span>
                <span class="font-bold text-gray-800 text-base">ร้านเพิ่มข้าว</span>
            </div>
        </div>
        <nav class="space-y-1 flex-1">
            <a href="#" class="sidebar-item active flex items-center gap-3 px-3 py-3 rounded-xl font-semibold text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                หน้าหลัก
            </a>
            <a href="/admin/manage_menu.html" class="sidebar-item flex items-center gap-3 px-3 py-3 rounded-xl text-gray-500 text-sm hover:text-gray-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                สินค้า
            </a>
            <a href="/admin/report.html" class="sidebar-item flex items-center gap-3 px-3 py-3 rounded-xl text-gray-500 text-sm hover:text-gray-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                รายงาน
            </a>
        </nav>
        <div class="px-3">
            <button onclick="window.location.href='/admin/login.html'" class="w-full py-2.5 bg-gray-100 text-gray-500 rounded-xl text-sm hover:bg-gray-200 transition font-medium">
                ออกจากระบบ
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 ml-60 p-8">
        <div class="max-w-5xl mx-auto">

            <!-- Header -->
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-2.5">
                    <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    <h1 class="text-xl font-bold text-gray-800">หน้าหลัก</h1>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    <span>อัปเดตอัตโนมัติทุก 10 วินาที</span>
                </div>
            </div>

            <!-- Stat Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="stat-card bg-white rounded-2xl p-6 border border-gray-100">
                    <p class="text-sm text-gray-400 mb-1.5">ออเดอร์ทั้งหมด</p>
                    <h3 id="stat-orders" class="text-4xl font-bold text-gray-800">0</h3>
                    <p class="text-sm text-gray-300 mt-1">รายการ</p>
                </div>
                <div class="stat-card bg-white rounded-2xl p-6 border border-gray-100">
                    <p class="text-sm text-gray-400 mb-1.5">รายได้รวม</p>
                    <h3 id="stat-revenue" class="text-4xl font-bold text-orange-500">฿0</h3>
                    <p class="text-sm text-gray-300 mt-1">บาท</p>
                </div>
                <div class="stat-card bg-white rounded-2xl p-6 border border-gray-100">
                    <p class="text-sm text-gray-400 mb-1.5">เมนูยอดนิยม</p>
                    <h3 id="stat-popular" class="text-2xl font-bold text-gray-800 truncate">-</h3>
                    <p class="text-sm text-gray-300 mt-1">สั่งมากที่สุด</p>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="table-card bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-50 flex justify-between items-center">
                    <h3 class="font-bold text-gray-800 text-base">รายการออเดอร์</h3>
                    <button onclick="clearOrders()" class="text-sm text-red-300 hover:text-red-500 transition">ล้างทั้งหมด</button>
                </div>

                <div id="empty-state" class="hidden py-16 text-center text-gray-300">
                    <div class="text-5xl mb-4">🍽️</div>
                    <p class="font-medium text-base">ยังไม่มีออเดอร์เข้ามา</p>
                    <p class="text-sm mt-1">ออเดอร์จากลูกค้าจะแสดงที่นี่</p>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-50 text-xs text-gray-400">
                            <tr>
                                <th class="px-6 py-3.5 font-semibold tracking-wide">เวลา</th>
                                <th class="px-6 py-3.5 font-semibold tracking-wide">ลูกค้า / โต๊ะ</th>
                                <th class="px-6 py-3.5 font-semibold tracking-wide">รายการ</th>
                                <th class="px-6 py-3.5 font-semibold tracking-wide">ยอดรวม</th>
                                <th class="px-6 py-3.5 font-semibold tracking-wide"></th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody" class="divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>


        function loadDashboard() {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const tbody = document.getElementById('orders-tbody');
            const emptyState = document.getElementById('empty-state');
            tbody.innerHTML = '';

            emptyState.classList.toggle('hidden', orders.length > 0);

            let totalRevenue = 0;
            const itemCount = {};
            orders.forEach(order => {
                totalRevenue += order.total;
                order.items.forEach(item => {
                    itemCount[item.name] = (itemCount[item.name] || 0) + item.quantity;
                });
            });

            const popularItem = Object.entries(itemCount).sort((a, b) => b[1] - a[1])[0];
            document.getElementById('stat-orders').textContent = orders.length;
            document.getElementById('stat-revenue').textContent = '฿' + totalRevenue.toLocaleString();
            document.getElementById('stat-popular').textContent = popularItem ? popularItem[0].split(' + ')[0] : '-';

            orders.forEach((order, index) => {
                const itemSummary = order.items.map(i => `${i.name} (${i.quantity})`).join(', ');

                const tr = document.createElement('tr');
                tr.className = 'fade-in hover:bg-gray-50 transition';
                tr.style.animationDelay = `${index * 0.03}s`;
                tr.innerHTML = `
                    <td class="px-6 py-4 text-gray-400 text-sm whitespace-nowrap">${order.time}</td>
                    <td class="px-6 py-4">
                        <p class="font-semibold text-gray-800 text-base">${order.customerName}</p>
                        <p class="text-sm text-gray-400">โต๊ะ ${order.table}</p>
                    </td>
                    <td class="px-6 py-4 text-gray-500 text-sm max-w-[220px] whitespace-normal leading-relaxed">${itemSummary}</td>
                    <td class="px-6 py-4 font-bold text-gray-800 text-base">฿${order.total}</td>
                    <td class="px-6 py-4">
                        <button onclick="deleteOrder(${index})" class="text-gray-300 hover:text-red-400 transition text-sm">ลบ</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteOrder(index) {
            if (!confirm('ลบออเดอร์นี้ใช่ไหม?')) return;
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.splice(index, 1);
            localStorage.setItem('orders', JSON.stringify(orders));
            loadDashboard();
        }

        function clearOrders() {
            if (!confirm('ล้างออเดอร์ทั้งหมดใช่ไหม?')) return;
            localStorage.removeItem('orders');
            loadDashboard();
        }

        loadDashboard();
        setInterval(loadDashboard, 10000);
    </script>

</body>
</html>
