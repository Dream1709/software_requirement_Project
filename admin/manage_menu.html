<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการอาหาร - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #ede9e2;
            background-image:
                radial-gradient(ellipse 80% 60% at 10% 0%, rgba(253,110,59,0.10) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 90% 100%, rgba(253,110,59,0.07) 0%, transparent 55%),
                repeating-linear-gradient(
                    0deg,
                    transparent, transparent 39px,
                    rgba(180,160,140,0.07) 39px, rgba(180,160,140,0.07) 40px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent, transparent 39px,
                    rgba(180,160,140,0.07) 39px, rgba(180,160,140,0.07) 40px
                );
        }

        /* Sidebar elevation */
        aside {
            box-shadow: 4px 0 24px rgba(0,0,0,0.07);
        }

        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background-color: #f5f0ea; }
        .sidebar-item.active { background-color: #fff0ea; color: #fd6e3b; font-weight: 600; }

        /* Category section title strip */
        .cat-strip {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 16px;
            padding: 10px 16px;
            margin-bottom: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Menu cards — layered shadow so they pop off background */
        .menu-card {
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow:
                0 1px 0 rgba(255,255,255,0.9) inset,
                0 2px 0 rgba(0,0,0,0.04),
                0 4px 16px rgba(0,0,0,0.07);
        }
        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 1px 0 rgba(255,255,255,0.9) inset,
                0 8px 28px rgba(0,0,0,0.13);
        }
        .menu-card:hover .delete-btn { opacity: 1; }
        .delete-btn { opacity: 0; transition: opacity 0.2s; }

        /* Main content container — subtle white floating panel */
        .content-panel {
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(2px);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.75);
            box-shadow: 0 4px 32px rgba(0,0,0,0.05);
            margin-bottom: 28px;
        }

        /* Page header bar */
        .page-header-bar {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(230,220,210,0.5);
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .fade-in { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-60 bg-white flex flex-col py-7 px-4 fixed h-full z-10">
        <div class="px-3 mb-9">
            <div class="flex items-center gap-2.5">
                <span class="text-orange-500 text-xl">✦</span>

        </div>
        <nav class="space-y-1 flex-1">

                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                หน้าหลัก
            </a>
            <a href="#" class="sidebar-item active flex items-center gap-3 px-3 py-3 rounded-xl text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                สินค้า
            </a>
            <a href="/admin/report.html" class="sidebar-item flex items-center gap-3 px-3 py-3 rounded-xl text-gray-500 text-sm hover:text-gray-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                รายงาน
            </a>
        </nav>
        <div class="px-3">
            <button onclick="window.location.href='/admin/login.html'" class="w-full py-2.5 bg-gray-100 text-gray-500 rounded-xl text-sm font-medium hover:bg-gray-200 transition">
                ออกจากระบบ
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 ml-60 p-8">
        <div class="max-w-5xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-2">
                    <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                    <h1 class="text-xl font-bold text-gray-800">รายการอาหาร</h1>
                </div>
                <button onclick="window.location.href='/admin/add_product.html'"
                    class="flex items-center gap-2 bg-orange-500 hover:bg-orange-600 text-white text-base font-medium px-5 py-2.5 rounded-full shadow-sm transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    เพิ่มเมนูใหม่ (Admin เพิ่มเอง)
                </button>
            </div>
            <div id="menu-container" class="space-y-10"></div>
        </div>
    </main>

    <!-- Delete Modal -->
    <div id="delete-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 w-[90%] max-w-sm shadow-2xl flex flex-col items-center">
            <div class="w-12 h-12 bg-orange-50 rounded-full flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900 mb-1">ลบเมนูนี้ใช่ไหม?</h3>
            <p class="text-gray-400 text-base mb-6">เมนูนี้จะถูกลบออกจากระบบถาวร</p>
            <div class="flex gap-3 w-full">
                <button onclick="hideDeleteModal()" class="flex-1 py-2.5 rounded-xl bg-gray-100 text-gray-600 font-medium text-base hover:bg-gray-200 transition">ยกเลิก</button>
                <button onclick="confirmDelete()" class="flex-1 py-2.5 rounded-xl bg-orange-500 text-white font-medium text-base hover:bg-orange-600 transition">ลบ</button>
            </div>
        </div>
    </div>

    <script>

            { id: 15, name: "ผัดฉ่า", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Phat Cha Kai.png" },

            { id: 21, name: "ข้าวผัดไข่", category: "เมนูข้าวผัด", img: "/รูปอาหาร/Khaophat Khai.png" },

            { id: 23, name: "ข้าวผัดสัปรดแฮม", category: "เมนูข้าวผัด", img: "/รูปอาหาร/Khaophat Prot Haem.png" },
            { id: 24, name: "ข้าวผัดไส้กรอก", category: "เมนูข้าวผัด", img: "/รูปอาหาร/Khaophat Saikrok.png" },

            { id: 44, name: "ยำปลากระป๋อง", category: "เมนูยำ", img: "/รูปอาหาร/Yam Pla Krapong.png" },
            { id: 45, name: "ยำหมูยอ", category: "เมนูยำ", img: "/รูปอาหาร/Yam MuYo.png" },
            { id: 46, name: "ยำรวมมิตร", category: "เมนูยำ", img: "/รูปอาหาร/Yam Ruam Mit.png" },
            { id: 47, name: "ยำปลากรอบ", category: "เมนูยำ", img: "/รูปอาหาร/Yam Pla Krop.png" },
            { id: 48, name: "ยำกุนเชียง", category: "เมนูยำ", img: "/รูปอาหาร/Yam Kunchiang.png" },
            { id: 49, name: "ยำไข่ดาว", category: "เมนูยำ", img: "/รูปอาหาร/Yam Khaidao.png" },
            { id: 50, name: "ข้าวคลุกกะปิ", category: "เมนูเพิ่มเติม", img: "/รูปอาหาร/Khao Khluk Kra Pi.png" },
        ];

        let deleteTargetId = null;

        function loadMenu() {
            const adminMenu = JSON.parse(localStorage.getItem('foodMenu')) || [];
            const allMenu = [...systemMenu, ...adminMenu];
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            // โหลด recommendedIds และสร้างหมวด "เมนูแนะนำ" จาก id จริง
            const recIds = JSON.parse(localStorage.getItem('recommendedIds')) || [8, 4, 25];
            const recItems = recIds.map(id => allMenu.find(m => m.id === id)).filter(Boolean);

            // categories ทั้งหมด ไม่รวม "เมนูแนะนำ" (เพราะเราจัดการเองด้านบน)
            const rawCats = [...new Set(allMenu.map(item => item.category))].filter(c => c !== 'เมนูแนะนำ');
            const categories = ['เมนูแนะนำ', ...rawCats];

            categories.forEach((cat, catIndex) => {
                const items = cat === 'เมนูแนะนำ' ? recItems : allMenu.filter(item => item.category === cat);
                const section = document.createElement('div');
                section.className = 'fade-in';
                section.style.animationDelay = `${catIndex * 0.05}s`;
                section.innerHTML = `
                    <div class="flex items-center gap-2 mb-4">
                        <h2 class="text-lg font-bold text-gray-800">${cat}</h2>
                        <button onclick="editCategory('${cat}')" class="text-gray-300 hover:text-orange-400 transition" title="แก้ไขหมวดหมู่">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                        </button>
                    </div>
                    <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3">
                        ${items.map(item => {
                            const isSystem = item.id <= 50;
                            return `
                            <div class="menu-card relative group rounded-2xl overflow-hidden bg-white shadow-sm border border-gray-100">
                                <div class="aspect-square overflow-hidden">
                                    <img src="${item.img}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" onerror="this.src='https://via.placeholder.com/200x200/f8ece7/b1745f?text=🍽️'">
                                </div>
                                <div class="p-2">
                                    <p class="text-sm font-medium text-gray-700 truncate">${item.name}</p>
                                    ${isSystem ? `<span class="text-xs text-gray-300">ระบบ</span>` : `<span class="text-xs text-orange-400">เพิ่มเอง</span>`}
                                </div>
                                ${!isSystem ? `
                                <button onclick="showDeleteModal(${item.id})"
                                    class="delete-btn absolute top-2 right-2 w-7 h-7 bg-red-500 text-white rounded-full flex items-center justify-center shadow-md hover:bg-red-600 transition text-xs">✕</button>
                                ` : ''}
                            </div>`;
                        }).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function editCategory(catName) {
            window.location.href = '/admin/edit_category.html?category=' + encodeURIComponent(catName);
        }

        function showDeleteModal(id) {
            deleteTargetId = id;
            document.getElementById('delete-modal').classList.remove('hidden');
        }

        function hideDeleteModal() {
            deleteTargetId = null;
            document.getElementById('delete-modal').classList.add('hidden');
        }

        function confirmDelete() {
            if (deleteTargetId !== null) {
                let adminMenu = JSON.parse(localStorage.getItem('foodMenu')) || [];
                adminMenu = adminMenu.filter(item => item.id !== deleteTargetId);
                localStorage.setItem('foodMenu', JSON.stringify(adminMenu));
                hideDeleteModal();
                loadMenu();
            }
        }

        loadMenu();
    </script>
</body>
</html>
