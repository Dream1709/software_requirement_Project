<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการเมนูอาหาร - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f9f7f2; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-8 max-w-6xl mx-auto">
        <button onclick="window.location.href='/admin/main.html'" class="text-gray-400">ปิด</button>
        <h1 class="text-xl font-bold text-gray-800">จัดการรายการอาหาร</h1>
        <button onclick="window.location.href='/admin/add_product.html'" class="bg-[#fd6e3b] text-white px-4 py-1 rounded-full text-sm font-bold shadow-md hover:bg-[#e55a2b] transition">
            + เพิ่มเมนู
        </button>
    </header>

    <nav class="flex flex-wrap justify-center gap-2 mb-10">
        <button onclick="filterMenu('all')" class="px-4 py-1 text-sm rounded-full bg-white border border-gray-200 shadow-sm hover:bg-orange-100 transition">เมนูทั้งหมด</button>
        <button onclick="filterMenu('เมนูต้มแกง')" class="px-4 py-1 text-sm rounded-full bg-white border border-gray-200 shadow-sm hover:bg-orange-100 transition">เมนูต้มแกง</button>
        <button onclick="filterMenu('เมนูตามสั่ง')" class="px-4 py-1 text-sm rounded-full bg-white border border-gray-200 shadow-sm hover:bg-orange-100 transition">เมนูตามสั่ง</button>
        <button onclick="filterMenu('เมนูเส้น')" class="px-4 py-1 text-sm rounded-full bg-white border border-gray-200 shadow-sm hover:bg-orange-100 transition">เมนูเส้น</button>
    </nav>

    <div id="admin-menu-container" class="max-w-6xl mx-auto space-y-12"></div>

    <script>
        // ข้อมูลระบบ (นำเข้าจากก้อนข้อมูลที่น้องดรีมให้มา)
        const recommendedMenu = [{ id: 1, name: "ผัดกะเพรา", category: "เมนูแนะนำ", img: "/รูปอาหาร/krapao-moo.png" },{ id: 2, name: "แกงเขียวหวาน", category: "เมนูแนะนำ", img: "/รูปอาหาร/Kaeng Khiaowan.png" }];
        const boilMenu = [{ id: 3, name: "แกงเขียวหวาน", category: "เมนูต้มแกง", img: "/รูปอาหาร/Kaeng Khiaowan.png" },{ id: 4, name: "ต้มยำ", category: "เมนูต้มแกง", img: "/รูปอาหาร/Tomyam.png" },{ id: 5, name: "แกงส้ม", category: "เมนูต้มแกง", img: "/รูปอาหาร/Kaengsom.png" },{ id: 6, name: "ต้มข่า", category: "เมนูต้มแกง", img: "/รูปอาหาร/Tomkha.png" },{ id: 7, name: "ต้มจืด", category: "เมนูต้มแกง", img: "/รูปอาหาร/tom-jed-moo.png" }];
        const orderMenu = [{ id: 8, name: "ผัดกะเพรา", category: "เมนูตามสั่ง", img: "/รูปอาหาร/krapao-moo.png" },{ id: 9, name: "ผัดคะน้า", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Phat Khana.png" },{ id: 10, name: "ราดพริก", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Kai Rat Phrik.png" },{ id: 11, name: "ผัดพริกเผา", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Kai Phrik Phao.png" },{ id: 12, name: "พะแนง", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Pha Nong Kai.png" },{ id: 13, name: "พริกแกง", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Phrik Kaeng Kai.png" },{ id: 14, name: "ผัดเผ็ด", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Phat Phet Kai.png" },{ id: 15, name: "ผัดฉ่า", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Phat Cha Kai.png" },{ id: 16, name: "ผัดผงกะหรี่", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Kai Phat Phong Kra Ri.png" },{ id: 17, name: "ทอดกะเทียม", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Kai Thot Krathiam.png" },{ id: 18, name: "ผัดผักรวม", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Phat Kruam.png" },{ id: 19, name: "ผัดพริกสด", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Phat Phrik Sot.png" },{ id: 20, name: "ไข่ยัดไส้", category: "เมนูตามสั่ง", img: "/รูปอาหาร/Khai Yat Sai.png" }];
        const friedRiceMenu = [{ id: 21, name: "ข้าวผัดไข่", category: "เมนูข้าวผัด", img: "/รูปอาหาร/Khaophat Khai.png" },{ id: 22, name: "ข้าวผัดแหนม", category: "เมนูข้าวผัด", img: "/รูปอาหาร/Khaophat Naem.png" },{ id: 23, name: "ข้าวผัดสัปรดแฮม", category: "เมนูข้าวผัด", img: "/รูปอาหาร/Khaophat Prot Haem.png" },{ id: 24, name: "ข้าวผัดไส้กรอก", category: "เมนูข้าวผัด", img: "/รูปอาหาร/Khaophat Saikrok.png" }];
        const friedMenu = [{ id: 25, name: "ปีกไก่ทอด", category: "เมนูทอด", img: "/รูปอาหาร/Pik Kai Thot.png" },{ id: 26, name: "หมูทอด", category: "เมนูทอด", img: "/รูปอาหาร/Mu Thot.png" },{ id: 27, name: "กุนเชียงทอด", category: "เมนูทอด", img: "/รูปอาหาร/Kunchiang Thot.png" },{ id: 28, name: "หมูยอทอด", category: "เมนูทอด", img: "/รูปอาหาร/MuYo Thot.png" },{ id: 29, name: "เนื้อทอด", category: "เมนูทอด", img: "/รูปอาหาร/Nuea Thot.png" },{ id: 30, name: "กุ้งทอด", category: "เมนูทอด", img: "/รูปอาหาร/Kung Thot.png" },{ id: 31, name: "ดอลลี่ทอด", category: "เมนูทอด", img: "/รูปอาหาร/Donli Thot.png" }];
        const namprikMenu = [{ id: 32, name: "น้ำพริกกระปิ + ชะอมทอด", category: "เมนูน้ำพริกกระปิ", img: "/รูปอาหาร/Namphrik Kra Pi ChaOm Thot.png" },{ id: 33, name: "น้ำพริกกระปิ + ปลาทูทอด", category: "เมนูน้ำพริกกระปิ", img: "/รูปอาหาร/Namphrik Kra Pi   Phak Thot.png" },{ id: 34, name: "น้ำพริกกระปิ + ปลานิลทอด", category: "เมนูน้ำพริกกระปิ", img: "/รูปอาหาร/Namphrik Kra Pi   Pla Nin Thot.png" },{ id: 35, name: "น้ำพริกกระปิ + ผักทอด", category: "เมนูน้ำพริกกระปิ", img: "/รูปอาหาร/Namphrik Kra Pi   Phak Thot.png" },{ id: 36, name: "น้ำพริกกระปิ + มะเขือยาวทอด", category: "เมนูน้ำพริกกระปิ", img: "/รูปอาหาร/Namphrik Kra Pi   MakhueaYao Thot.png" }];
        const NoodleMenu = [{ id: 37, name: "ผัดมาม่า", category: "เมนูเส้น", img: "/รูปอาหาร/Phat Ma Ma.png" },{ id: 38, name: "สุกี้", category: "เมนูเส้น", img: "/รูปอาหาร/Suk Ki.png" },{ id: 39, name: "ราดหน้า", category: "เมนูเส้น", img: "/รูปอาหาร/Rat Na.png" },{ id: 40, name: "ผัดไทย", category: "เมนูเส้น", img: "/รูปอาหาร/PhatThai.png" },{ id: 41, name: "ผัดซีอิ้ว", category: "เมนูเส้น", img: "/รูปอาหาร/Phat Si Io.png" },{ id: 42, name: "สปาเก็ตตี้", category: "เมนูเส้น", img: "/รูปอาหาร/Sapa Ket Ti.png" }];
        const spicyMenu = [{ id: 43, name: "ยำวุ้นเส้นหมูสับ", category: "เมนูยำ", img: "/รูปอาหาร/Yam Wunsen Mu.png" },{ id: 44, name: "ยำปลากระป๋อง", category: "เมนูยำ", img: "/รูปอาหาร/Yam Pla Krapong.png" },{ id: 45, name: "ยำหมูยอ", category: "เมนูยำ", img: "/รูปอาหาร/Yam MuYo.png" },{ id: 46, name: "ยำรวมมิตร", category: "เมนูยำ", img: "/รูปอาหาร/Yam Ruam Mit.png" },{ id: 47, name: "ยำปลากรอบ", category: "เมนูยำ", img: "/รูปอาหาร/Yam Pla Krop.png" },{ id: 48, name: "ยำกุนเชียง", category: "เมนูยำ", img: "/รูปอาหาร/Yam Kunchiang.png" },{ id: 49, name: "ยำไข่ดาว", category: "เมนูยำ", img: "/รูปอาหาร/Yam Khaidao.png" }];
        const extraMenu = [{id: 50, name: "ข้าวคลุกกะปิ", category: "เมนูเพิ่มเติม", img: "/รูปอาหาร/Khao Khluk Kra Pi.png" }];

        const allDefaultMenu = [...recommendedMenu, ...boilMenu, ...orderMenu, ...friedRiceMenu, ...friedMenu, ...namprikMenu, ...NoodleMenu, ...spicyMenu, ...extraMenu];

        function renderAdminMenu(data) {
            const container = document.getElementById('admin-menu-container');
            container.innerHTML = '';
            
            // แยกหมวดหมู่เหมือนหน้าลูกค้า
            const categories = [...new Set(data.map(item => item.category))];
            
            categories.forEach(cat => {
                const items = data.filter(item => item.category === cat);
                const section = document.createElement('div');
                section.innerHTML = `
                    <h2 class="text-lg font-bold mb-4 text-gray-800">${cat}</h2>
                    <div class="flex overflow-x-auto gap-4 no-scrollbar pb-4">
                        ${items.map(item => {
                            const isSystem = item.id <= 50; // เช็คว่าเป็นเมนูระบบหรือแอดมินเพิ่มเอง
                            return `
                            <div class="flex-shrink-0 w-44 md:w-56 relative group">
                                <div class="overflow-hidden rounded-2xl shadow-md aspect-square mb-3 bg-white border border-gray-100">
                                    <img src="${item.img}" class="w-full h-full object-cover">
                                    
                                    ${!isSystem ? `
                                        <button onclick="deleteProduct(${item.id})" 
                                            class="absolute top-2 right-2 bg-red-500 text-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center hover:bg-red-600 transition">
                                            ✕
                                        </button>
                                    ` : `
                                        <div class="absolute top-2 left-2 bg-gray-800/50 text-white text-[10px] px-2 py-1 rounded-full backdrop-blur-sm">
                                            ระบบ
                                        </div>
                                    `}
                                </div>
                                <p class="text-sm font-medium text-gray-700 truncate">${item.name}</p>
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function loadData() {
            const adminMenu = JSON.parse(localStorage.getItem('foodMenu')) || [];
            renderAdminMenu([...adminMenu, ...allDefaultMenu]);
        }

        function filterMenu(category) {
            const adminMenu = JSON.parse(localStorage.getItem('foodMenu')) || [];
            const total = [...adminMenu, ...allDefaultMenu];
            if (category === 'all') renderAdminMenu(total);
            else renderAdminMenu(total.filter(item => item.category === category));
        }

        function deleteProduct(id) {
            if (confirm('ลบเมนูนี้ใช่ไหม?')) {
                let adminMenu = JSON.parse(localStorage.getItem('foodMenu')) || [];
                adminMenu = adminMenu.filter(item => item.id !== id);
                localStorage.setItem('foodMenu', JSON.stringify(adminMenu));
                loadData();
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
