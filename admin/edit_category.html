        body { font-family: 'Kanit', sans-serif; background-color: #f5f5f0; }
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background-color: #f0ede8; }
        .menu-row { transition: box-shadow 0.15s, transform 0.15s; }
        .menu-row:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); transform: translateY(-1px); }
        .fade-in { animation: fadeIn 0.3s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

        /* Picker card */
        .picker-card { position: relative; cursor: pointer; transition: transform 0.15s; border-radius: 0.75rem; overflow: hidden; }
        .picker-card:hover { transform: scale(1.05); }
        .picker-card img { width:100%; aspect-ratio:1; object-fit:cover; display:block; border-radius:0.75rem; }
        .picker-overlay { position:absolute; inset:0; border-radius:0.75rem; display:flex; align-items:center; justify-content:center; transition: background 0.2s; }
        .picker-card.is-selected .picker-overlay { background: rgba(253,110,59,0.55); }
        .picker-card.not-selected .picker-overlay { background: rgba(0,0,0,0.22); }
        .picker-card.not-selected:hover .picker-overlay { background: rgba(253,110,59,0.3); }
        .picker-label { font-size:0.75rem; text-align:center; color:#555; margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    </style>
</head>

const adminMenu  = JSON.parse(localStorage.getItem('foodMenu')) || [];
const allMenu    = [...defaultMenu, ...adminMenu];

// recommendedIds เก็บ id ของเมนูที่อยู่ใน "แนะนำ"
let recommendedIds = JSON.parse(localStorage.getItem('recommendedIds'));
if (!recommendedIds) {
    recommendedIds = [8, 4, 25]; // ผัดกะเพรา(id8), ต้มยำ(id4), ปีกไก่ทอด(id25) — ตรงกับ manage_menu
}

let deleteTargetId = null;

// ========= INIT =========
function init() {
    if (isRec) {
        document.getElementById('btn-recommended').classList.remove('hidden');
    }
    // หมวดทั่วไป: แสดงแค่รายการ + ลบ ไม่มีปุ่มเพิ่ม
    renderCurrentList();
}

// ========= VIEW 1: รายการปัจจุบัน =========
function renderCurrentList() {
    const container = document.getElementById('items-container');
    container.innerHTML = '';

    let items = [];
    if (isRec) {
        items = allMenu.filter(m => recommendedIds.includes(m.id));
    } else {
        items = allMenu.filter(m => m.category === category);
    }

    if (items.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-300 text-sm py-8">ยังไม่มีรายการในหมวดนี้</p>`;
        return;
    }

    items.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'menu-row fade-in bg-white rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4 p-3 pr-5';
        row.style.animationDelay = `${i * 0.04}s`;
        row.innerHTML = `
            <div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 bg-gray-100">
                <img src="${item.img}" alt="${item.name}" class="w-full h-full object-cover"
                    onerror="this.src='https://placehold.co/64x64/f8ece7/b1745f?text=🍽'">
            </div>
            <div class="flex-1 min-w-0">
                <p class="font-medium text-gray-800 text-base truncate">${item.name}</p>
                <p class="text-sm text-gray-400 mt-0.5">${item.category}</p>
            </div>
            <span class="text-base font-medium text-[#b1745f] flex-shrink-0 mr-4">${item.price ? item.price + " บาท" : "-"}</span>
            <button onclick="${isRec ? `removeFromRec(${item.id})` : `showDeleteModal(${item.id},'${item.name.replace(/'/g,"\\'")}') `}"
                class="text-gray-300 hover:text-red-400 transition flex-shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </button>
        `;
        container.appendChild(row);
    });
}

function removeFromRec(id) {
    recommendedIds = recommendedIds.filter(i => i !== id);
    renderCurrentList();
}

// ========= VIEW 2: Picker =========
function showPickerView() {
    document.getElementById('view-current').classList.add('hidden');
    document.getElementById('view-picker').classList.remove('hidden');
    renderPicker();
}

function showCurrentView() {
    document.getElementById('view-picker').classList.add('hidden');
    document.getElementById('view-current').classList.remove('hidden');
    renderCurrentList();
}

function renderPicker() {
    const container = document.getElementById('picker-container');
    container.innerHTML = '';

    // แบ่งเป็นหมวดๆ (รวม เมนูแนะนำ ด้วยเพื่อแสดงเมนูที่เลือกไว้แล้ว)
    const cats = [...new Set(allMenu.map(m => m.category))];

    cats.forEach((cat, ci) => {
        const items = allMenu.filter(m => m.category === cat);
        const section = document.createElement('div');
        section.className = 'fade-in';
        section.style.animationDelay = `${ci * 0.04}s`;

        const cardsHtml = items.map(item => {
            const sel = recommendedIds.includes(item.id);
            return `
            <div class="picker-card ${sel ? 'is-selected' : 'not-selected'}"
                id="pc-${item.id}"
                onclick="togglePicker(${item.id})">
                <img src="${item.img}" alt="${item.name}"
                    onerror="this.src='https://placehold.co/120x120/f8ece7/b1745f?text=🍽'">
                <div class="picker-overlay">
                    ${sel
                        ? `<svg class="w-7 h-7 text-white drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>`
                        : `<svg class="w-6 h-6 text-white/80 drop-shadow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>`
                    }
                </div>
                <p class="picker-label">${item.name}</p>
            </div>`;
        }).join('');

        const selCount = items.filter(i => recommendedIds.includes(i.id)).length;
        section.innerHTML = `
            <div class="flex items-center gap-2 mb-3">
                <h3 class="text-base font-bold text-gray-700">${cat}</h3>
                <span id="cnt-${CSS.escape(cat)}" class="text-xs text-gray-400 bg-gray-100 rounded-full px-2 py-0.5">${selCount > 0 ? selCount + ' เลือก' : ''}</span>
            </div>
            <div class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 gap-2">${cardsHtml}</div>
        `;
        container.appendChild(section);
    });
}

function togglePicker(id) {
    const card = document.getElementById('pc-' + id);
    if (!card) return;

    if (recommendedIds.includes(id)) {
        // นำออก
        recommendedIds = recommendedIds.filter(i => i !== id);
        card.classList.remove('is-selected');
        card.classList.add('not-selected');
        card.querySelector('.picker-overlay').innerHTML = `<svg class="w-6 h-6 text-white/80 drop-shadow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>`;
    } else {
        // เพิ่ม
        recommendedIds.push(id);
        card.classList.add('is-selected');
        card.classList.remove('not-selected');
        card.querySelector('.picker-overlay').innerHTML = `<svg class="w-7 h-7 text-white drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>`;
    }

    // อัปเดต badge count ของหมวดนั้น
    const item  = allMenu.find(m => m.id === id);
    if (item) {
        const catItems = allMenu.filter(m => m.category === item.category);
        const cnt = catItems.filter(m => recommendedIds.includes(m.id)).length;
        const badge = document.getElementById('cnt-' + CSS.escape(item.category));
        if (badge) badge.textContent = cnt > 0 ? cnt + ' เลือก' : '';
    }
}

// ========= DELETE (หมวดทั่วไป) =========
function showDeleteModal(id, name) {
    deleteTargetId = id;
    document.getElementById('delete-item-name').textContent = '"' + name + '" จะถูกลบออกจากหมวดนี้';
    document.getElementById('delete-modal').classList.remove('hidden');
}
function hideDeleteModal() {
    deleteTargetId = null;
    document.getElementById('delete-modal').classList.add('hidden');
}
function confirmDelete() {
    if (deleteTargetId !== null && deleteTargetId > 50) {
        // ลบออกจาก adminMenu เท่านั้น (ระบบ id 1-51 ลบไม่ได้)
        let saved = JSON.parse(localStorage.getItem('foodMenu')) || [];
        saved = saved.filter(m => m.id !== deleteTargetId);
        localStorage.setItem('foodMenu', JSON.stringify(saved));
    }
    hideDeleteModal();
    renderCurrentList();
}

// ========= SAVE =========
function saveChanges() {
    localStorage.setItem('recommendedIds', JSON.stringify(recommendedIds));
    alert('บันทึกเรียบร้อยแล้ว!');
    window.location.href = '/admin/manage_menu.html';
}

init();
</script>
